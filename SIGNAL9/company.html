<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL 9 | 기업 실적 분석</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #0a0f1e;
            --bg-card: #161e31;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #262f45;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg-main); color: var(--text-main); }
        header { padding: 15px 30px; background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
        .main-layout { display: flex; flex-direction: column; padding: 20px; max-width: 1400px; margin: 0 auto; gap: 15px; }
        .card { background: var(--bg-card); padding: 24px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .section-label { color: var(--accent); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        .company-btn { padding: 8px 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-dim); border-radius: 4px; font-weight: 700; font-size: 0.75rem; transition: 0.2s; }
        .company-btn:hover, .company-btn.active { background: var(--accent); color: var(--bg-main); }
    </style>
</head>
<body>
    <header>
        <div class="logo">SIGNAL 9</div>
        <div style="font-size: 0.8rem; color: var(--text-dim);">기업 실적 분석 | 
            <a href="index.html" class="text-sky-400 hover:text-white">← 메인(FOMC)으로</a>
        </div>
    </header>
    
    <div class="main-layout">
        <div class="card">
            <span class="section-label">기업 선택</span>
            <div id="company-selector" class="flex flex-wrap gap-2">
                <button onclick="selectCompany('NVIDIA')" id="btn-NVIDIA" class="company-btn active">NVDA</button>
                <button onclick="selectCompany('Google')" id="btn-Google" class="company-btn">GOOGL</button>
                <button onclick="selectCompany('Apple')" id="btn-Apple" class="company-btn">AAPL</button>
                <button onclick="selectCompany('Microsoft')" id="btn-Microsoft" class="company-btn">MSFT</button>
                <button onclick="selectCompany('Amazon')" id="btn-Amazon" class="company-btn">AMZN</button>
                <button onclick="selectCompany('Meta')" id="btn-Meta" class="company-btn">META</button>
                <button onclick="selectCompany('Broadcom')" id="btn-Broadcom" class="company-btn">AVGO</button>
                <button onclick="selectCompany('Tesla')" id="btn-Tesla" class="company-btn">TSLA</button>
                <button onclick="selectCompany('Berkshire')" id="btn-Berkshire" class="company-btn">BRK</button>
            </div>
        </div>

        <div class="card h-[500px]">
            <h3 class="text-xl font-bold mb-4" id="chart-title">기업 핵심 키워드</h3>
            <div class="flex-grow">
                <canvas id="companyChart"></canvas>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        let currentCompany = 'NVIDIA';
        let rawData = null;

        function selectCompany(company) {
            currentCompany = company;
            document.querySelectorAll('.company-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${company}`).classList.add('active');
            updateUI();
        }

        function updateUI() {
            if (!rawData) return;
            document.getElementById('chart-title').innerText = `${currentCompany} 핵심 키워드 분석`;
            const filteredData = rawData.keywords.filter(item => item.type === currentCompany);
            filteredData.sort((a, b) => b.count - a.count);
            renderChart(filteredData);
        }

        let myChart = null;
        function renderChart(data) {
            const ctx = document.getElementById('companyChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(k => k.word),
                    datasets: [{
                        label: '언급 빈도 (Count)',
                        data: data.map(k => k.count),
                        backgroundColor: 'rgba(56, 189, 248, 0.4)',
                        borderColor: 'rgba(56, 189, 248, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#262f45' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.onload = function() { 
            fetch('indicators.json')
                .then(response => response.json())
                .then(data => {
                    rawData = data;
                    updateUI();
                })
                .catch(err => console.error("Data Load Error:", err));
        };
    </script>
</body>
</html>
