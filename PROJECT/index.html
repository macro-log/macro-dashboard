<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL 9 | 투자를 위한 선택</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-main: #0a0f1e; --bg-card: #161e31; --accent: #38bdf8; --text-main: #f1f5f9; --text-dim: #94a3b8; --border: #262f45; --danger: #ef4444; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; overflow-x: hidden; }
        .main-layout { display: flex; flex-direction: column; padding: 20px; max-width: 1600px; margin: 0 auto; gap: 15px; }
        .nav-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        button { padding: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-dim); border-radius: 4px; font-weight: 700; font-size: 0.8rem; transition: 0.2s; }
        button:hover { background: var(--accent); color: var(--bg-main); border-color: var(--accent); }
        
        #chart_box { height: 500px; background: #131722; border-radius: 8px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        #ticker_container { height: 100px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .card { background: var(--bg-card); padding: 24px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .section-label { color: var(--accent); font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
        
        .scroll-list::-webkit-scrollbar { width: 4px; height: 6px; }
        .scroll-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        
        /* 캘린더 모달 스타일 (기존 알림창 스타일 계승) */
        #calendar-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 90%; max-width: 1000px; height: 85vh; background: var(--bg-card); border: 1px solid var(--accent); border-radius: 12px; padding: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .modal-overlay-cal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1999; }
        
        /* FullCalendar 내부 스타일 조정 (다크모드 최적화) */
        .fc { --fc-border-color: #262f45; --fc-page-bg-color: #161e31; font-size: 0.8rem; }
        .fc-toolbar-title { font-size: 1.1rem !important; font-weight: 800; color: var(--accent); }
        .fc-daygrid-day-number { color: var(--text-dim); padding: 5px !important; }
        .fc-col-header-cell-cushion { color: var(--accent); font-size: 0.7rem; }
        .fc-event { border: none !important; padding: 2px 5px; cursor: pointer; }

        .cal-row { display: grid; grid-template-columns: 100px 1fr 100px 100px; gap: 15px; padding: 12px; border-bottom: 1px solid var(--border); align-items: center; transition: 0.2s; }
        .cal-row:hover { background: rgba(56, 189, 248, 0.05); }

        /* 알림 애니메이션 등 기존 스타일 유지 */
        @keyframes alert-blink { 0% { background-color: var(--danger); } 50% { background-color: #f59e0b; } 100% { background-color: var(--danger); } }
        .alert-active { animation: alert-blink 0.5s infinite; color: white !important; cursor: pointer; border-radius: 8px; }
        #alert-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; width: 320px; background: var(--bg-card); border: 1px solid var(--accent); border-radius: 8px; padding: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
    </style>
</head>
<body>
    <header class="p-4 bg-[#161e31] border-b border-[#262f45] flex justify-between items-center px-8">
        <div class="flex items-center gap-3">
            <div class="w-3 h-8 bg-[#38bdf8] rounded-sm"></div>
            <div class="text-2xl font-black text-[#38bdf8] tracking-tighter">SIGNAL 9</div>
        </div>

        <div id="alert-bar" class="flex items-center gap-4 bg-[#0a0f1e] px-4 py-2 rounded border border-[#262f45] transition-all">
            <select id="alert-symbol" class="bg-transparent text-[10px] text-sky-400 font-bold focus:outline-none">
                <option value="BINANCE:BTCUSDT">BTC</option>
                <option value="FOREXCOM:SPX500">S&P 500</option>
                <option value="FOREXCOM:NAS100">NASDAQ 100</option>
                <option value="TVC:GOLD">GOLD</option>
                <option value="TVC:USOIL">WTI</option>
            </select>
            <input id="alert-price" type="number" placeholder="목표가" class="bg-transparent border-b border-[#262f45] text-xs text-sky-400 focus:outline-none w-20">
            <button id="alert-btn" onclick="addAlert()" class="py-1 px-3 text-[10px] bg-sky-900 text-sky-300 border-none hover:bg-sky-600 rounded">추가</button>
            <button onclick="toggleModal(true)" class="py-1 px-3 text-[10px] bg-gray-800 text-gray-300 border-none hover:bg-gray-700 rounded">🔔 목록</button>
            <span id="current-btc" class="text-[10px] font-mono text-gray-400">LOADING...</span>
        </div>
        <div class="text-[11px] text-gray-500 font-bold tracking-widest uppercase">투자를 위한 선택</div>
    </header>

    <div id="calendar-overlay" class="modal-overlay-cal" onclick="toggleCalendar(false)"></div>
    <div id="calendar-modal">
        <div class="flex justify-between items-center mb-4 border-b border-[#262f45] pb-2">
            <h4 class="text-sm font-bold text-sky-400 uppercase tracking-widest">Macro Economic Calendar</h4>
            <button onclick="toggleCalendar(false)" class="text-xs text-red-400 hover:text-white transition-all">CLOSE ✕</button>
        </div>
        <div id="full-calendar-el" style="height: calc(100% - 50px);"></div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="toggleModal(false)"></div>
    <div id="alert-modal">
        <div class="flex justify-between items-center mb-4 border-b border-[#262f45] pb-2">
            <h4 class="text-sm font-bold text-sky-400">설정된 알림 목록</h4>
            <button onclick="toggleModal(false)" class="text-xs text-gray-500">닫기</button>
        </div>
        <ul id="active-alert-list" class="space-y-2 max-h-[250px] overflow-y-auto text-xs"><li class="text-gray-500 text-center py-4">설정된 알림이 없습니다.</li></ul>
    </div>

    <div class="main-layout">
        <div class="nav-group">
            <button onclick="changeWidget('BINANCE:BTCUSDT')">BITCOIN</button>
            <button onclick="changeWidget('FOREXCOM:SPX500')">S&P 500</button>
            <button onclick="changeWidget('FOREXCOM:NAS100')">NASDAQ 100</button>
            <button onclick="changeWidget('FOREXCOM:DJI')">DOW JONES</button>
            <button onclick="changeWidget('US10Y')">US 10년 국채</button>
            <button onclick="changeWidget('US02Y')">US 2년 국채</button>
            <button onclick="changeWidget('TVC:GOLD')">GOLD (XAU)</button>
            <button onclick="changeWidget('TVC:USOIL')">WTI CRUDE</button>
        </div>

        <div id="ticker_container"></div>
        <div id="chart_box"></div>
        
        <div class="card mb-5">
            <div class="flex justify-between items-center mb-4">
                <div><span class="section-label">Economic Focus</span><h3 class="text-xl font-bold">금일 주요 경제지표</h3></div>
                <div class="flex gap-2">
                    <button onclick="toggleCalendar(true)" class="text-[10px] bg-sky-900 text-sky-300 border-none hover:bg-sky-600 px-4 py-1 rounded">📅 전체 일정 달력보기</button>
                    <div id="sync-status" class="text-[10px] text-gray-500 font-bold border border-gray-700 px-3 py-1 rounded uppercase">SYNCING...</div>
                </div>
            </div>
            <div id="calendar-container" class="scroll-list">
                <div class="cal-row cal-header">
                    <div>TIME</div>
                    <div>EVENT NAME</div>
                    <div>IMPACT</div>
                    <div>D-DAY</div>
                </div>
                <div id="calendar-list-body">
                    <div class="text-center py-10 text-gray-500 text-xs italic">데이터를 불러오고 있습니다...</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-5">
            <div class="card h-[600px]">
                <div class="flex justify-between items-start mb-4">
                    <div><span class="section-label">Dual Analytics</span><h3 class="text-xl font-bold">실시간 연준 심리 분석</h3></div>
                    <div class="flex items-center gap-3 bg-[#0a0f1e] px-4 py-2 rounded-lg border border-[#262f45]">
                        <div class="flex flex-col text-right">
                            <span class="text-[9px] text-gray-500 font-bold">MARKET TEMP</span>
                            <span class="text-xl font-black italic tracking-tighter" id="temp-value">0.0°</span>
                        </div>
                    </div>
                </div>
                <div class="flex-grow flex flex-col gap-4">
                    <div class="h-3/5 border-b border-gray-800 pb-2"><canvas id="sentimentChart"></canvas></div>
                    <div class="h-2/5 pt-2"><canvas id="volumeChart"></canvas></div>
                </div>
            </div>
            <div class="card h-[600px]">
                <div class="mb-4 border-b border-[#262f45] pb-4"><span class="section-label">Metrics Breakdown</span><h3 class="text-lg font-bold">분석 데이터 상세 리스트</h3></div>
                <ul id="indicator-list" class="scroll-list space-y-2 overflow-y-auto pr-2"></ul>
            </div>
        </div>

        <div class="card mb-5 h-[350px]">
            <div class="flex justify-between items-center mb-4">
                <div><span class="section-label">Historical Analysis</span><h3 class="text-xl font-bold">연준 정책 시그널 트렌드</h3></div>
            </div>
            <div class="flex-grow relative"><canvas id="trendChart"></canvas></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let sentimentChart = null, volumeChart = null, trendChart = null;
        let alertList = [], fullCalendar = null, allEvents = [];
        let lastBtcPrice = 0;

        // 캘린더 모달 제어
        function toggleCalendar(show) {
            document.getElementById('calendar-modal').style.display = show ? 'block' : 'none';
            document.getElementById('calendar-overlay').style.display = show ? 'block' : 'none';
            if (show && !fullCalendar) initFullCalendar();
            if (show) setTimeout(() => fullCalendar.render(), 100);
        }

        // 전체 달력 초기화
        function initFullCalendar() {
            const calendarEl = document.getElementById('full-calendar-el');
            fullCalendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,dayGridWeek' },
                events: allEvents.map(e => ({
                    title: e.name,
                    start: e.date.split(' ')[0],
                    backgroundColor: e.importance === 'CRITICAL' ? '#ef4444' : (e.importance === 'HIGH' ? '#f59e0b' : '#38bdf8'),
                    allDay: true
                })),
                eventClick: function(info) { alert(info.event.title + '\n일정: ' + info.event.start.toLocaleDateString()); }
            });
        }

        // 경제지표 데이터 업데이트 (오늘 지표 필터링 포함)
        async function updateCalendar() {
            try {
                const response = await fetch('./economic_events.json?v=' + Date.now());
                allEvents = await response.json();
            } catch (err) {
                // 데이터 로드 실패 시 더미 데이터 (형님 일정 확인용)
                allEvents = [
                    { "date": "2026-03-09 21:30", "name": "미국 소비자물가지수 (CPI)", "importance": "CRITICAL" },
                    { "date": "2026-03-09 22:00", "name": "근원 CPI (MoM)", "importance": "HIGH" },
                    { "date": "2026-03-12 21:30", "name": "미국 신규 실업수당청구건수", "importance": "HIGH" },
                    { "date": "2026-03-19 03:00", "name": "FOMC 금리 결정", "importance": "CRITICAL" }
                ];
            }
            renderTodayOnly(allEvents);
            document.getElementById('sync-status').innerText = "LIVE SYNC ACTIVE";
        }

        // 오늘 날짜 데이터만 리스트에 렌더링
        function renderTodayOnly(events) {
            const container = document.getElementById('calendar-list-body');
            const todayStr = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
            
            const todayEvents = events.filter(ev => ev.date.startsWith(todayStr));

            if (todayEvents.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500 text-xs">금일 예정된 주요 지표 발표가 없습니다.</div>`;
                return;
            }

            container.innerHTML = todayEvents.map(ev => {
                const colorClass = ev.importance === 'CRITICAL' ? 'text-red-500' : (ev.importance === 'HIGH' ? 'text-orange-500' : 'text-sky-500');
                const timeOnly = ev.date.split(' ')[1];
                return `
                <div class="cal-row text-xs">
                    <div class="font-mono text-gray-400 font-bold">${timeOnly}</div>
                    <div class="font-bold text-white truncate">${ev.name}</div>
                    <div class="font-black ${colorClass} text-[10px]">${ev.importance}</div>
                    <div class="font-mono font-bold ${colorClass} text-right">TODAY</div>
                </div>`;
            }).join('');
        }

        /* --- 기존 함수 유지 (수정 없음) --- */
        function requestNotificationPermission() { if ("Notification" in window && Notification.permission === "default") Notification.requestPermission(); }
        function toggleModal(show) { document.getElementById('alert-modal').style.display = show ? 'block' : 'none'; document.getElementById('modal-overlay').style.display = show ? 'block' : 'none'; }
        function addAlert() {
            const select = document.getElementById('alert-symbol');
            const symbol = select.value;
            const name = select.options[select.selectedIndex].text;
            const price = parseFloat(document.getElementById('alert-price').value);
            if (!price) return alert("가격을 입력하세요!");
            const direction = price > lastBtcPrice ? 'UP' : 'DOWN';
            alertList.push({ id: Date.now(), symbol: symbol, name: name, target: price, direction: direction });
            document.getElementById('alert-price').value = "";
            renderAlertList();
        }
        function renderAlertList() {
            const listEl = document.getElementById('active-alert-list');
            if (alertList.length === 0) { listEl.innerHTML = `<li class="text-gray-500 text-center py-4">설정된 알림이 없습니다.</li>`; return; }
            listEl.innerHTML = alertList.map(a => `<li class="flex justify-between items-center p-2 bg-[#1e293b] rounded border-l-2 border-sky-500"><span class="text-white"><b class="text-sky-400">${a.name}</b> $${a.target.toLocaleString()}</span><button onclick="removeAlert(${a.id})" class="p-1 text-red-500 hover:text-white bg-transparent border-none text-[10px]">삭제</button></li>`).join('');
        }
        function removeAlert(id) { alertList = alertList.filter(a => a.id !== id); renderAlertList(); }
        async function checkPrice() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await res.json();
                const currentPrice = parseFloat(data.price);
                document.getElementById('current-btc').innerText = `BTC: $${currentPrice.toLocaleString()}`;
                alertList.forEach((a, index) => {
                    if (a.symbol === "BINANCE:BTCUSDT") {
                        let trig = (a.direction === 'UP' && currentPrice >= a.target) || (a.direction === 'DOWN' && currentPrice <= a.target);
                        if (trig) { triggerPushAlert(a.name, a.target, currentPrice); alertList.splice(index, 1); renderAlertList(); }
                    }
                });
                lastBtcPrice = currentPrice;
            } catch (e) {}
        }
        function triggerPushAlert(name, target, current) {
            const bar = document.getElementById('alert-bar'); bar.classList.add('alert-active');
            setTimeout(() => bar.classList.remove('alert-active'), 5000);
            if (Notification.permission === "granted") new Notification(`🚨 [SIGNAL 9] ${name} 도달!`, { body: `${name} 목표가 $${target.toLocaleString()} 도달!` });
        }
        function loadTicker(symbol) {
            const container = document.getElementById('ticker_container'); container.innerHTML = "";
            const script = document.createElement('script'); script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
            script.async = true; script.innerHTML = JSON.stringify({ "symbol": symbol, "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "ko" });
            container.appendChild(script);
        }
        function loadChart(symbol) {
            document.getElementById('chart_box').innerHTML = "";
            new TradingView.widget({ "width": "100%", "height": 500, "symbol": symbol, "interval": "15", "theme": "dark", "style": "1", "container_id": "chart_box", "hide_side_toolbar": true, "allow_symbol_change": true, "timezone": "Asia/Seoul", "session": "extended", "has_intraday": true });
        }
        function changeWidget(symbol) { loadTicker(symbol); loadChart(symbol); }

        async function updateTerminalData() {
            try {
                const res = await fetch('./indicators.json?v=' + Date.now());
                const data = await res.json();
                const tempEl = document.getElementById('temp-value');
                tempEl.innerText = data.market_temp + '°';
                tempEl.className = parseFloat(data.market_temp) >= 0 ? "text-xl font-black italic text-sky-400" : "text-xl font-black italic text-red-400";
                const labels = data.indicators.map(i => i.word);
                if (sentimentChart) sentimentChart.destroy();
                sentimentChart = new Chart(document.getElementById('sentimentChart'), { type: 'bar', data: { labels: labels, datasets: [{ data: data.indicators.map(i => i.sentiment_score), backgroundColor: data.indicators.map(i => i.sentiment_score >= 0 ? 'rgba(56, 189, 248, 0.6)' : 'rgba(239, 68, 68, 0.6)'), borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: -10, max: 10, grid: { color: '#262f45' } } } } });
                if (volumeChart) volumeChart.destroy();
                volumeChart = new Chart(document.getElementById('volumeChart'), { type: 'bar', data: { labels: labels, datasets: [{ data: data.indicators.map(i => i.count), backgroundColor: 'rgba(148, 163, 184, 0.4)', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { display: false } } } } });
                document.getElementById('indicator-list').innerHTML = data.indicators.map(i => `<li class="flex justify-between items-center p-3 rounded bg-[#1e293b] border-l-4 ${i.status === 'POSITIVE' ? 'border-sky-500' : 'border-red-500'}"><div class="flex flex-col"><span class="font-bold text-white">${i.word}</span><span class="text-[10px] text-gray-500">${i.count} MENTIONS</span></div><span class="font-mono font-bold ${i.sentiment_score >= 0 ? 'text-sky-400' : 'text-red-400'}">${i.display_score}</span></li>`).join('');
            } catch (e) {}
        }
        async function loadTrendData() {
            try {
                const res = await fetch('./historical_data.json?v=' + Date.now());
                const hData = await res.json();
                if (trendChart) trendChart.destroy();
                trendChart = new Chart(document.getElementById('trendChart'), { type: 'line', data: { labels: hData.map(d => d.date), datasets: [{ data: hData.map(d => d.score), borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)', fill: true, tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#262f45' } }, x: { grid: { display: false } } } } });
            } catch (e) {}
        }

        window.onload = () => { 
            changeWidget('BINANCE:BTCUSDT'); updateTerminalData(); loadTrendData(); updateCalendar(); 
            setInterval(checkPrice, 2000); setInterval(updateTerminalData, 30000); setInterval(updateCalendar, 60000);
            requestNotificationPermission();
        };
    </script>
</body>
</html>
