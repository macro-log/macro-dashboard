<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL 9 | 핵심 데이터 터미널</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #0a0f1e; --bg-card: #161e31; --accent: #38bdf8;
            --text-main: #f1f5f9; --text-dim: #94a3b8; --border: #262f45;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg-main); color: var(--text-main); }
        header { padding: 15px 30px; background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
        .main-layout { display: flex; flex-direction: column; padding: 20px; max-width: 1400px; margin: 0 auto; gap: 15px; }
        .nav-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        button { padding: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-dim); border-radius: 4px; font-weight: 700; font-size: 0.8rem; transition: 0.2s; }
        button:hover { background: var(--accent); color: var(--bg-main); }
        #ticker_container { height: 80px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        #chart_box { height: 600px; background: var(--bg-card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .analysis-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 10px; }
        .card { background: var(--bg-card); padding: 24px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .section-label { color: var(--accent); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .scroll-list { max-height: 380px; overflow-y: auto; }
        .scroll-list::-webkit-scrollbar { width: 4px; }
        .scroll-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SIGNAL 9</div>
        <div style="font-size: 0.8rem; color: var(--text-dim);">핵심 데이터 터미널</div>
    </header>
    
    <div class="main-layout">
        <div class="nav-group">
            <button onclick="changeWidget('BINANCE:BTCUSDT')">비트코인</button>
            <button onclick="changeWidget('AMEX:SPY')">S&P 500 (SPY)</button>
            <button onclick="changeWidget('NASDAQ:QQQ')">나스닥 100 (QQQ)</button>
            <button onclick="changeWidget('AMEX:DIA')">다우존스 (DIA)</button>
            <button onclick="changeWidget('US10Y')">미국 10년 국채</button>
            <button onclick="changeWidget('US02Y')">미국 2년 국채</button>
            <button onclick="changeWidget('TVC:GOLD')">금</button>
            <button onclick="changeWidget('TVC:USOIL')">유가</button>
        </div>

        <div id="ticker_container"></div>
        <div id="chart_box"></div>

        <div class="analysis-grid">
            <div class="card h-[500px]">
                <div class="flex justify-between items-center mb-2">
                    <div>
                        <span class="section-label">Market Sentiment Index</span>
                        <div class="flex items-center gap-3">
                            <h2 class="text-3xl font-black italic" id="temp-value">0.0°</h2>
                            <div class="w-24 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                                <div id="temp-bar" class="h-full bg-gray-500 transition-all duration-1000" style="width: 50%;"></div>
                            </div>
                        </div>
                    </div>
                    <button onclick="toggleDataType()" id="toggle-btn" class="!px-3 !py-1 !text-[10px] !bg-[#262f45] !text-white !border-none">기업 키워드 보기</button>
                </div>
                <h3 class="text-sm font-bold mb-4 text-slate-400" id="chart-title">FOMC 의사록: 상위 10개 키워드</h3>
                <div class="flex-grow">
                    <canvas id="keywordChart"></canvas>
                </div>
            </div>

            <div class="card h-[500px]">
                <div class="flex justify-between items-end mb-4 border-b border-[#262f45] pb-3">
                    <div>
                        <span class="section-label">Detailed Data</span>
                        <h3 class="text-lg font-bold" id="list-title">상세 데이터 변화</h3>
                    </div>
                    <div class="flex gap-4 text-[11px] font-mono leading-tight">
                        <div class="text-right border-r border-[#262f45] pr-3">
                            <span class="text-gray-500 block text-[9px]">S&P 500</span>
                            <span id="spy-react" class="font-bold">0.0%</span>
                        </div>
                        <div class="text-right border-r border-[#262f45] pr-3">
                            <span class="text-gray-500 block text-[9px]">NAS 100</span>
                            <span id="qqq-react" class="font-bold">0.0%</span>
                        </div>
                        <div class="text-right">
                            <span class="text-gray-500 block text-[9px]">DOW</span>
                            <span id="dia-react" class="font-bold">0.0%</span>
                        </div>
                    </div>
                </div>
                <ul id="indicator-list" class="scroll-list space-y-2"></ul>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        let currentDataType = 'fomc'; let rawData = null; let myChart = null;

        function changeWidget(symbol) { loadTicker(symbol); loadChart(symbol); }
        function loadTicker(symbol) {
            const container = document.getElementById('ticker_container'); container.innerHTML = "";
            const script = document.createElement('script'); script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
            script.async = true; script.innerHTML = JSON.stringify({ "symbol": symbol, "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "ko" });
            container.appendChild(script);
        }
        function loadChart(symbol) {
            document.getElementById('chart_box').innerHTML = "";
            new TradingView.widget({ "width": "100%", "height": 600, "symbol": symbol, "interval": "D", "timezone": "Asia/Seoul", "theme": "dark", "style": "1", "locale": "ko", "container_id": "chart_box", "hide_side_toolbar": false, "withdateranges": true });
        }

        function toggleDataType() { currentDataType = (currentDataType === 'fomc') ? 'company' : 'fomc'; updateUI(); }

        function updateUI() {
            if (!rawData) return;
            const indicators = rawData.indicators || rawData; // 구조 호환성
            
            // [상단 온도 업데이트]
            const temp = rawData.market_temp || 0;
            document.getElementById('temp-value').innerText = (temp > 0 ? '+' : '') + temp + '°';
            const bar = document.getElementById('temp-bar');
            bar.style.width = ((temp + 100) / 2).toFixed(1) + '%';
            if(temp >= 15) bar.className = "h-full bg-sky-500";
            else if(temp <= -15) bar.className = "h-full bg-red-500";
            else bar.className = "h-full bg-gray-500";

            // [깨알 지수 반응 업데이트]
            const react = rawData.market_reaction || { "SPY": "0.0%", "QQQ": "0.0%", "DIA": "0.0%" };
            const setReact = (id, val) => {
                const el = document.getElementById(id); el.innerText = val;
                el.className = val.includes('-') ? "font-bold text-red-500" : "font-bold text-sky-400";
            };
            setReact('spy-react', react.SPY); setReact('qqq-react', react.QQQ); setReact('dia-react', react.DIA);

            const filteredData = indicators.filter(item => currentDataType === 'fomc' ? item.type === 'fomc' : item.type === 'company');
            filteredData.sort((a, b) => b.sentiment_score - a.sentiment_score);
            renderChartAndList(filteredData);
        }

        function renderChartAndList(data) {
            const listElement = document.getElementById('indicator-list'); listElement.innerHTML = ""; 
            const top10 = data.slice(0, 10);
            const ctx = document.getElementById('keywordChart').getContext('2d');
            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top10.map(k => k.word),
                    datasets: [{
                        data: top10.map(k => k.sentiment_score),
                        backgroundColor: top10.map(k => k.sentiment_score >= 0 ? 'rgba(56, 189, 248, 0.4)' : 'rgba(239, 68, 68, 0.4)'),
                        borderColor: top10.map(k => k.sentiment_score >= 0 ? 'rgba(56, 189, 248, 1)' : 'rgba(239, 68, 68, 1)'),
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { grid: { color: '#262f45' }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 9 }, maxRotation: 45, minRotation: 45 } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            data.forEach(item => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center p-3 rounded bg-[#1e293b] border border-[#262f45] hover:border-[#38bdf8] transition-all';
                const score = item.sentiment_score;
                const diff = item.score_diff || 0;
                li.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-bold text-sm text-slate-100">${item.word}</span>
                        <span class="text-[10px] text-gray-400 font-semibold">변화: <b class="${diff > 0 ? 'text-blue-400' : (diff < 0 ? 'text-red-500' : 'text-gray-500')}">${diff > 0 ? '+' : ''}${diff}</b></span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-mono ${score >= 0 ? 'text-sky-400' : 'text-red-400'}">${score > 0 ? '+' : ''}${score}</span>
                    </div>
                `;
                listElement.appendChild(li);
            });
        }

        window.onload = function() { 
            changeWidget('BINANCE:BTCUSDT');
            fetch('indicators.json?v=' + new Date().getTime())
                .then(r => r.json()).then(d => { rawData = d; updateUI(); });
        };
    </script>
</body>
</html>
