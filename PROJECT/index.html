<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL 9 | 핵심 데이터 터미널</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #0a0f1e;
            --bg-card: #161e31;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #262f45;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg-main); color: var(--text-main); }
        header { padding: 15px 30px; background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
        .main-layout { display: flex; flex-direction: column; padding: 20px; max-width: 1400px; margin: 0 auto; gap: 15px; }
        .nav-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        button { padding: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-dim); border-radius: 4px; font-weight: 700; font-size: 0.8rem; transition: 0.2s; }
        button:hover { background: var(--accent); color: var(--bg-main); }
        #ticker_container { height: 80px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        #chart_box { height: 600px; background: var(--bg-card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .analysis-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 10px; }
        .card { background: var(--bg-card); padding: 24px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .section-label { color: var(--accent); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .scroll-list { max-height: 350px; overflow-y: auto; }
        .scroll-list::-webkit-scrollbar { width: 4px; }
        .scroll-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SIGNAL 9</div>
        <div style="font-size: 0.8rem; color: var(--text-dim);">핵심 데이터 터미널</div>
    </header>
    
    <div class="main-layout">
        <div class="nav-group">
            <button onclick="changeWidget('BINANCE:BTCUSDT')">비트코인</button>
            <button onclick="changeWidget('AMEX:SPY')">S&P 500 (SPY)</button>
            <button onclick="changeWidget('NASDAQ:QQQ')">나스닥 100 (QQQ)</button>
            <button onclick="changeWidget('AMEX:DIA')">다우존스 (DIA)</button>
            <button onclick="changeWidget('US10Y')">미국 10년 국채</button>
            <button onclick="changeWidget('US02Y')">미국 2년 국채</button>
            <button onclick="changeWidget('TVC:GOLD')">금</button>
            <button onclick="changeWidget('TVC:USOIL')">유가</button>
        </div>

        <div id="ticker_container"></div>
        <div id="chart_box"></div>

        <div class="analysis-grid">
            <div class="card h-[450px]">
                <div class="flex justify-between items-center mb-4">
                    <span class="section-label" id="chart-title-label">키워드 심리 분석</span>
                    <button onclick="toggleDataType()" id="toggle-btn" class="!px-3 !py-1 !text-xs !bg-[#262f45] !text-white !border-none">기업 키워드 보기</button>
                </div>
                <h3 class="text-xl font-bold mb-4" id="chart-title">FOMC 의사록: 상위 10개 키워드</h3>
                <div class="flex-grow">
                    <canvas id="keywordChart"></canvas>
                </div>
            </div>

            <div class="card h-[450px]">
                <span class="section-label">핵심 데이터 목록</span>
                <h3 class="text-xl font-bold mb-4" id="list-title">상세 데이터 변화</h3>
                <ul id="indicator-list" class="scroll-list space-y-2"></ul>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        let currentDataType = 'fomc';
        let rawData = null;

        function loadTicker(symbol) {
            const container = document.getElementById('ticker_container');
            container.innerHTML = "";
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
            script.async = true;
            script.innerHTML = JSON.stringify({
                "symbol": symbol, "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "ko"
            });
            container.appendChild(script);
        }

        function loadChart(symbol) {
            document.getElementById('chart_box').innerHTML = "";
            const hideVolumeSymbols = ['TVC:GOLD'];                
            const showVolume = !hideVolumeSymbols.includes(symbol);
            new TradingView.widget({
                "width": "100%", "height": 600, "symbol": symbol, "interval": "D",
                "timezone": "Asia/Seoul", "theme": "dark", "style": "1", "locale": "ko",
                "container_id": "chart_box", "hide_side_toolbar": false, "withdateranges": true,
                "details": false, "hotlist": false, "calendar": false,
                "studies": showVolume ? [ "Volume@tv-basicstudies" ] : [] 
            });
        }

        function changeWidget(symbol) {
            loadTicker(symbol);
            loadChart(symbol);
        }

        function toggleDataType() {
            currentDataType = (currentDataType === 'fomc') ? 'company' : 'fomc';
            updateUI();
        }

        function updateUI() {
            if (!rawData) return;

            const toggleBtn = document.getElementById('toggle-btn');
            const chartTitle = document.getElementById('chart-title');
            const chartTitleLabel = document.getElementById('chart-title-label');
            const listTitle = document.getElementById('list-title');

            if (currentDataType === 'fomc') {
                toggleBtn.innerText = "기업 키워드 보기";
                chartTitleLabel.innerText = "키워드 심리 분석";
                chartTitle.innerText = "FOMC 의사록: 상위 10개 키워드";
                listTitle.innerText = "상세 데이터 변화";
            } else {
                toggleBtn.innerText = "FOMC 분석 보기";
                chartTitleLabel.innerText = "기업 심리 분석";
                chartTitle.innerText = "핵심 기업: 상위 10개 키워드";
                listTitle.innerText = "기업별 단어 변화";
            }

            const filteredData = rawData.filter(item => {
                return currentDataType === 'fomc' ? item.type === 'fomc' : item.type === 'company';
            });

            // 점수 내림차순 정렬
            filteredData.sort((a, b) => b.sentiment_score - a.sentiment_score);

            renderChartAndList(filteredData);
        }

        let myChart = null;
        function renderChartAndList(data) {
            const listElement = document.getElementById('indicator-list');
            listElement.innerHTML = ""; 

            const top10 = data.slice(0, 10);
            const ctx = document.getElementById('keywordChart').getContext('2d');

            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top10.map(k => k.word),
                    datasets: [{
                        label: '감성 점수 (Sentiment)',
                        data: top10.map(k => k.sentiment_score),
                        backgroundColor: top10.map(k => k.sentiment_score >= 0 ? 'rgba(56, 189, 248, 0.4)' : 'rgba(220, 53, 69, 0.4)'),
                        borderColor: top10.map(k => k.sentiment_score >= 0 ? 'rgba(56, 189, 248, 1)' : 'rgba(220, 53, 69, 1)'),
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: false, grid: { color: '#262f45' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            data.forEach(item => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center p-3 rounded bg-[#1e293b] border border-[#262f45] hover:border-[#38bdf8] transition-all';
                
                const score = item.sentiment_score;
                const diff = item.score_diff || 0; // 변화량 가져오기
                const trendIcon = score > 0 ? '🔺' : (score < 0 ? '🔻' : '➖');
                const scoreColor = score > 0 ? 'text-sky-400' : (score < 0 ? 'text-red-400' : 'text-gray-400');
                
                // 변화량 컬러 (좋아졌으면 파랑, 나빠졌으면 빨강)
                const diffColor = diff > 0 ? 'text-blue-400' : (diff < 0 ? 'text-red-500' : 'text-gray-500');
                const diffText = diff > 0 ? `(+${diff})` : (diff < 0 ? `(${diff})` : '(0.0)');
                const source = item.source || "Analysis"; 

                li.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-bold text-sm text-slate-100">${item.word}</span>
                        <span class="text-[10px] text-gray-400 font-semibold">
                            ${source} | 지난번 대비: <b class="${diffColor}">${diffText}</b>
                        </span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-mono ${scoreColor}">${score > 0 ? '+' : ''}${score}</span>
                        <span class="text-xs">${trendIcon}</span>
                    </div>
                `;
                listElement.appendChild(li);
            });
        }

        window.onload = function() { 
            changeWidget('BINANCE:BTCUSDT');
            // 캐시 방지용 시간 파라미터 추가
            fetch('indicators.json?v=' + new Date().getTime())
                .then(response => response.json())
                .then(data => {
                    rawData = data;
                    updateUI();
                })
                .catch(err => console.error("Data Load Error:", err));
        };
    </script>
</body>
</html>
