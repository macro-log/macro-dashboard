<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Dashboard - FOMC Analysis</title>
    <style>
        :root { --main-bg: #f0f2f5; --card-bg: #ffffff; --pos-color: #007bff; --neg-color: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--main-bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; }
        
        header { background: #2c3e50; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        
        /* 트레이딩뷰 차트 구역 */
        .chart-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        @media (max-width: 768px) { .chart-container { grid-template-columns: 1fr; } }

        /* 분석 카드 디자인 */
        .card { background: var(--card-bg); margin-bottom: 15px; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-top: 5px solid #ccc; }
        .card.pos { border-top-color: var(--pos-color); }
        .card.neg { border-top-color: var(--neg-color); }
        .card-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .score-badge { font-size: 1.1em; font-weight: 800; }
        .pos .score-badge { color: var(--pos-color); }
        .neg .score-badge { color: var(--neg-color); }
        .context { background: #f8f9fa; padding: 15px; border-radius: 6px; margin: 10px 0; font-size: 0.95em; color: #555; border-left: 3px solid #eee; }
        .meta { font-size: 0.85em; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 MACRO REAL-TIME DASHBOARD</h1>
            <p>시장 주요 지표 및 FOMC 단어 분석</p>
        </header>

        <div class="chart-container">
            <div style="height:400px;">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div id="tradingview_nasdaq" style="height:100%;width:100%"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                    <script type="text/javascript">
                    new TradingView.widget({
                      "autosize": true, "symbol": "NASDAQ:IXIC", "interval": "D", "timezone": "Etc/UTC", "theme": "light", "style": "1", "locale": "en", "toolbar_bg": "#f1f3f6", "enable_publishing": false, "allow_symbol_change": true, "container_id": "tradingview_nasdaq"
                    });
                    </script>
                </div>
            </div>
            <div style="height:400px;">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div id="tradingview_dxy" style="height:100%;width:100%"></div>
                    <script type="text/javascript">
                    new TradingView.widget({
                      "autosize": true, "symbol": "CAPITALCOM:DXY", "interval": "D", "timezone": "Etc/UTC", "theme": "light", "style": "1", "locale": "en", "toolbar_bg": "#f1f3f6", "enable_publishing": false, "allow_symbol_change": true, "container_id": "tradingview_dxy"
                    });
                    </script>
                </div>
            </div>
        </div>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #ddd;">

        <h2 style="margin-bottom: 20px;">🔍 FOMC Sentiment Analysis (Score Order)</h2>
        <div id="fomc-list">데이터를 분석 중입니다...</div>
    </div>

    <script>
        async function loadAnalysis() {
            try {
                const res = await fetch('indicators.json?v=' + new Date().getTime());
                const data = await res.json();
                
                // +에서 - 순으로 정렬
                data.sort((a, b) => b.sentiment_score - a.sentiment_score);

                const list = document.getElementById('fomc-list');
                list.innerHTML = '';

                data.forEach(item => {
                    const score = item.sentiment_score;
                    const statusClass = score > 0 ? 'pos' : (score < 0 ? 'neg' : '');
                    
                    list.innerHTML += `
                        <div class="card ${statusClass}">
                            <div class="card-header">
                                <span class="keyword">🏷️ ${item.word}</span>
                                <span class="score-badge">${score > 0 ? '+' : ''}${score.toFixed(1)}점</span>
                            </div>
                            <div class="context"><b>맥락:</b> "${item.context}"</div>
                            <div class="meta">언급 횟수: <b>${item.count}회</b> | 추세: <b>${item.trend.toUpperCase()}</b></div>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('fomc-list').innerHTML = "데이터 로딩 오류";
            }
        }
        window.onload = loadAnalysis;
    </script>
</body>
</html>
