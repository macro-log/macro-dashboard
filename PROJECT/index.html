<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL 9 | REAL-TIME MACRO TERMINAL</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root{
--bg-main:#0a0f1e;
--bg-card:#161e31;
--accent:#38bdf8;
--text-main:#f1f5f9;
--text-dim:#94a3b8;
--border:#262f45;
}

body{
font-family:'Pretendard',sans-serif;
background:var(--bg-main);
color:var(--text-main);
margin:0;
overflow-x:hidden;
}

.main-layout{
display:flex;
flex-direction:column;
padding:20px;
max-width:1600px;
margin:0 auto;
gap:15px;
}

.nav-group{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:8px;
}

button{
padding:12px;
cursor:pointer;
border:1px solid var(--border);
background:var(--bg-card);
color:var(--text-dim);
border-radius:4px;
font-weight:700;
font-size:.8rem;
transition:.2s;
}

button:hover{
background:var(--accent);
color:#000;
border-color:var(--accent);
}

/* 🔥 TradingView container FIXED */

#chart_box{
height:600px;
background:#131722;
border-radius:8px;
border:1px solid var(--border);
position:relative;
overflow:visible;
}

#ticker_container{
height:75px;
background:var(--bg-card);
border-radius:8px;
border:1px solid var(--border);
overflow:hidden;
}

.card{
background:var(--bg-card);
padding:24px;
border-radius:8px;
border:1px solid var(--border);
display:flex;
flex-direction:column;
box-shadow:0 10px 15px -3px rgba(0,0,0,.3);
}

.section-label{
color:var(--accent);
font-weight:800;
font-size:.7rem;
text-transform:uppercase;
letter-spacing:1px;
margin-bottom:4px;
display:block;
}

.scroll-list::-webkit-scrollbar{width:4px}
.scroll-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

.news-item{
border-bottom:1px solid var(--border);
padding:8px 0;
transition:.2s;
}

.news-item:hover{background:#1e293b}

</style>
</head>

<body>

<header class="p-4 bg-[#161e31] border-b border-[#262f45] flex justify-between items-center px-8">
<div class="flex items-center gap-3">
<div class="w-3 h-8 bg-[#38bdf8] rounded-sm"></div>
<div class="text-2xl font-black text-[#38bdf8] tracking-tighter">SIGNAL 9</div>
</div>
<div class="text-[11px] text-gray-500 font-bold tracking-widest">
REAL-TIME MACRO TERMINAL V2.9
</div>
</header>

<div class="main-layout">

<div class="nav-group">
<button onclick="changeWidget('BINANCE:BTCUSDT')">BITCOIN</button>
<button onclick="changeWidget('AMEX:SPY')">S&P 500 (SPY)</button>
<button onclick="changeWidget('NASDAQ:QQQ')">NASDAQ 100</button>
<button onclick="changeWidget('AMEX:DIA')">DOW JONES</button>
<button onclick="changeWidget('TVC:US10Y')">US 10Y BOND</button>
<button onclick="changeWidget('TVC:US02Y')">US 2Y BOND</button>
<button onclick="changeWidget('TVC:GOLD')">GOLD (XAU)</button>
<button onclick="changeWidget('TVC:USOIL')">WTI CRUDE</button>
</div>

<div id="ticker_container"></div>
<div id="chart_box"></div>

<!-- 나머지 UI 그대로 유지 -->

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

let sentimentChart=null,volumeChart=null,trendChart=null;

/* TradingView chart */

function loadChart(symbol){

document.getElementById("chart_box").innerHTML="";

new TradingView.widget({

autosize:true,
symbol:symbol,
interval:"D",
container_id:"chart_box",

theme:"dark",
style:"1",

allow_symbol_change:false,
hide_side_toolbar:true,

studies:["Volume@tv-basicstudies"],

overrides:{
"paneProperties.background":"#131722",
"paneProperties.vertGridProperties.color":"#262f45",
"paneProperties.horzGridProperties.color":"#262f45",

"paneProperties.topMargin":30,
"paneProperties.bottomMargin":15,

"scalesProperties.fontSize":14
}

});

}

/* ticker */

function loadTicker(symbol){

const container=document.getElementById("ticker_container");
container.innerHTML="";

const script=document.createElement("script");

script.src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
script.async=true;

script.innerHTML=JSON.stringify({
symbol:symbol,
width:"100%",
colorTheme:"dark",
isTransparent:true,
locale:"ko"
});

container.appendChild(script);

}

function changeWidget(symbol){
loadTicker(symbol);
loadChart(symbol);
}

/* 기존 분석 시스템 그대로 */

window.onload=()=>{
changeWidget("BINANCE:BTCUSDT");
updateTerminalData();
loadTrendData();
};

setInterval(updateTerminalData,30000);

</script>

</body>
</html>
