<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL 9 | CORE TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-main: #0a0f1e; --bg-card: #161e31; --accent: #38bdf8; --text-main: #f1f5f9; --text-dim: #94a3b8; --border: #262f45; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; overflow-x: hidden; }
        .main-layout { display: flex; flex-direction: column; padding: 20px; max-width: 1400px; margin: 0 auto; gap: 15px; }
        .nav-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        button { padding: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-dim); border-radius: 4px; font-weight: 700; font-size: 0.8rem; transition: 0.2s; }
        button:hover { background: var(--accent); color: var(--bg-main); border-color: var(--accent); }
        #ticker_container { height: 75px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        #chart_box { height: 600px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .card { background: var(--bg-card); padding: 24px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .section-label { color: var(--accent); font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
        .scroll-list::-webkit-scrollbar { width: 4px; }
        .scroll-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>
    <header class="p-4 bg-[#161e31] border-b border-[#262f45] flex justify-between items-center px-8">
        <div class="flex items-center gap-3">
            <div class="w-3 h-8 bg-[#38bdf8] rounded-sm"></div>
            <div class="text-2xl font-black text-[#38bdf8] tracking-tighter">SIGNAL 9</div>
        </div>
        <div class="text-[11px] text-gray-500 font-bold tracking-widest">REAL-TIME MACRO TERMINAL V2.8</div>
    </header>

    <div class="main-layout">
        <div class="nav-group">
            <button onclick="changeWidget('BINANCE:BTCUSDT')">BITCOIN</button>
            <button onclick="changeWidget('AMEX:SPY')">S&P 500 (SPY)</button>
            <button onclick="changeWidget('NASDAQ:QQQ')">NASDAQ 100</button>
            <button onclick="changeWidget('AMEX:DIA')">DOW JONES</button>
            <button onclick="changeWidget('US10Y')">US 10Y BOND</button>
            <button onclick="changeWidget('US02Y')">US 2Y BOND</button>
            <button onclick="changeWidget('TVC:GOLD')">GOLD (XAU)</button>
            <button onclick="changeWidget('TVC:USOIL')">WTI CRUDE</button>
        </div>

        <div id="ticker_container"></div>
        <div id="chart_box"></div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-10">
            <div class="card h-[520px]">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span class="section-label">Sentiment Sentiment</span>
                        <h3 class="text-xl font-bold">FOMC 다빈도 키워드 TOP 10</h3>
                    </div>
                    <div class="flex items-center gap-3 bg-[#0a0f1e] px-4 py-2 rounded-lg border border-[#262f45] shadow-inner">
                        <div class="flex flex-col">
                            <span class="text-[9px] text-gray-500 font-bold uppercase">Market Temp</span>
                            <span class="text-2xl font-black italic tracking-tighter" id="temp-value">0.0°</span>
                        </div>
                        <div class="w-12 h-1.5 bg-gray-800 rounded-full overflow-hidden mt-1">
                            <div id="temp-bar" class="h-full bg-sky-500 transition-all duration-1000" style="width: 50%;"></div>
                        </div>
                    </div>
                </div>
                <div class="flex-grow">
                    <canvas id="keywordChart"></canvas>
                </div>
            </div>

            <div class="card h-[520px]">
                <div class="mb-4 border-b border-[#262f45] pb-4">
                    <span class="section-label">Metrics Breakdown</span>
                    <h3 class="text-lg font-bold">키워드별 감성 수치 (+/-)</h3>
                </div>
                <ul id="indicator-list" class="scroll-list space-y-2 overflow-y-auto pr-2">
                    </ul>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let myChart = null;

        function loadTicker(symbol) {
            const container = document.getElementById('ticker_container');
            container.innerHTML = "";
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
            script.async = true;
            script.innerHTML = JSON.stringify({ "symbol": symbol, "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "ko" });
            container.appendChild(script);
        }

        function loadChart(symbol) {
            document.getElementById('chart_box').innerHTML = "";
            new TradingView.widget({
                "width": "100%", "height": 600, "symbol": symbol, "interval": "D", "theme": "dark", "style": "1", "container_id": "chart_box",
                "overrides": { 
                    "paneProperties.topMargin": 25,
                    "mainSeriesProperties.candleStyle.upColor": "#089981",
                    "mainSeriesProperties.candleStyle.downColor": "#f23645"
                }
            });
        }

        function changeWidget(symbol) { loadTicker(symbol); loadChart(symbol); }

        async function updateTerminalData() {
            try {
                const response = await fetch('indicators.json?v=' + Date.now());
                const data = await response.json();

                // 1. 온도 업데이트
                const tempVal = data.market_temp;
                const tempNum = parseFloat(tempVal);
                const tempElement = document.getElementById('temp-value');
                tempElement.innerText = tempVal + '°';
                tempElement.className = tempNum >= 0 ? "text-2xl font-black italic tracking-tighter text-sky-400" : "text-2xl font-black italic tracking-tighter text-red-500";
                document.getElementById('temp-bar').style.width = ((tempNum + 100) / 2) + '%';
                document.getElementById('temp-bar').style.backgroundColor = tempNum >= 0 ? "#38bdf8" : "#ef4444";

                // 2. 차트 업데이트
                const ctx = document.getElementById('keywordChart').getContext('2d');
                if (myChart) myChart.destroy();
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.indicators.map(i => i.word),
                        datasets: [{
                            data: data.indicators.map(i => i.sentiment_score),
                            backgroundColor: data.indicators.map(i => i.sentiment_score >= 0 ? 'rgba(56, 189, 248, 0.5)' : 'rgba(239, 68, 68, 0.5)'),
                            borderColor: data.indicators.map(i => i.sentiment_score >= 0 ? '#38bdf8' : '#ef4444'),
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            y: { min: -10, max: 10, grid: { color: '#262f45' }, ticks: { color: '#94a3b8' } },
                            x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });

                // 3. 리스트 업데이트 (부호 포함)
                const list = document.getElementById('indicator-list');
                list.innerHTML = data.indicators.map(i => `
                    <li class="flex justify-between items-center p-3.5 rounded-lg bg-[#1e293b] border border-[#262f45] hover:border-[#38bdf8] transition-all group">
                        <div class="flex flex-col">
                            <span class="font-bold text-sm group-hover:text-white transition-colors">${i.word}</span>
                            <span class="text-[10px] text-gray-500 font-mono">CHANGE: ${i.score_diff}</span>
                        </div>
                        <span class="text-base font-black font-mono italic ${i.sentiment_score >= 0 ? 'text-sky-400' : 'text-red-400'}">
                            ${i.display_score}
                        </span>
                    </li>
                `).join('');

            } catch (err) { console.error("Update Error:", err); }
        }

        window.onload = () => { changeWidget('BINANCE:BTCUSDT'); updateTerminalData(); };
    </script>
</body>
</html>
