<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL 9 | 투자를 위한 선택</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-main: #0a0f1e; --bg-card: #161e31; --accent: #38bdf8; --text-main: #f1f5f9; --text-dim: #94a3b8; --border: #262f45; --danger: #ef4444; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; overflow-x: hidden; }
        .main-layout { display: flex; flex-direction: column; padding: 20px; max-width: 1600px; margin: 0 auto; gap: 15px; }
        .nav-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        button { padding: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-dim); border-radius: 4px; font-weight: 700; font-size: 0.8rem; transition: 0.2s; }
        button:hover { background: var(--accent); color: var(--bg-main); border-color: var(--accent); }
        
        #chart_box { height: 500px; background: #131722; border-radius: 8px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        #ticker_container { height: 100px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .card { background: var(--bg-card); padding: 24px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .section-label { color: var(--accent); font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
        
        .scroll-list::-webkit-scrollbar { width: 4px; height: 6px; }
        .scroll-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .news-item { border-bottom: 1px solid var(--border); padding: 8px 0; transition: 0.2s; }
        .news-item:hover { background: #1e293b; }

        .event-card { min-width: 300px; flex-shrink: 0; transition: 0.2s; border-left: 4px solid var(--border); margin-top: 5px;}
        .event-card:hover { background: #1e293b; transform: translateY(-4px); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);}
        #calendar-container { scroll-behavior: smooth; padding-top: 10px; /* 카드가 위로 올라가도 안 잘리게 여유 공간 생성 */}

        /* 알림 전용 애니메이션 */
        @keyframes alert-blink {
            0% { background-color: var(--danger); }
            50% { background-color: #f59e0b; }
            100% { background-color: var(--danger); }
        }
        .alert-active { animation: alert-blink 0.5s infinite; color: white !important; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>
    <header class="p-4 bg-[#161e31] border-b border-[#262f45] flex justify-between items-center px-8">
        <div class="flex items-center gap-3">
            <div class="w-3 h-8 bg-[#38bdf8] rounded-sm"></div>
            <div class="text-2xl font-black text-[#38bdf8] tracking-tighter">SIGNAL 9</div>
        </div>

        <div id="alert-bar" class="flex items-center gap-4 bg-[#0a0f1e] px-4 py-2 rounded border border-[#262f45] transition-all">
            <span class="text-[10px] font-bold text-gray-500">PRICE ALERT</span>
            <input id="alert-price" type="number" placeholder="목표가 입력" class="bg-transparent border-b border-[#262f45] text-xs text-sky-400 focus:outline-none w-24">
            <button id="alert-btn" onclick="toggleAlert()" class="py-1 px-3 text-[10px] bg-sky-900 text-sky-300 border-none hover:bg-sky-600 rounded">설정</button>
            <span id="current-btc" class="text-[10px] font-mono text-gray-400">BTC LOADING...</span>
        </div>

        <div class="text-[11px] text-gray-500 font-bold tracking-widest uppercase">Real-Time Macro Terminal</div>
    </header>

    <div class="main-layout">
        <div class="nav-group">
            <button onclick="changeWidget('BINANCE:BTCUSDT')">BITCOIN</button>
            <button onclick="changeWidget('AMEX:SPY')">S&P 500 (SPY)</button>
            <button onclick="changeWidget('NASDAQ:QQQ')">NASDAQ 100</button>
            <button onclick="changeWidget('AMEX:DIA')">DOW JONES</button>
            <button onclick="changeWidget('US10Y')">US 10Y BOND</button>
            <button onclick="changeWidget('US02Y')">US 2Y BOND</button>
            <button onclick="changeWidget('TVC:GOLD')">GOLD (XAU)</button>
            <button onclick="changeWidget('TVC:USOIL')">WTI CRUDE</button>
        </div>

        <div id="ticker_container"></div>
        <div id="chart_box"></div>

        <div class="card mb-5">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <span class="section-label">Economic Calendar</span>
                    <h3 class="text-xl font-bold">주요 매크로 일정</h3>
                </div>
                <div id="sync-status" class="text-[10px] text-gray-500 font-bold border border-gray-700 px-3 py-1 rounded">WAITING...</div>
            </div>
            <div id="calendar-container" class="flex gap-4 overflow-x-auto pb-4 scroll-list"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-5">
            <div class="card h-[600px]">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span class="section-label">Dual Analytics</span>
                        <h3 class="text-xl font-bold">실시간 연준 심리 분석</h3>
                    </div>
                    <div class="flex items-center gap-3 bg-[#0a0f1e] px-4 py-2 rounded-lg border border-[#262f45]">
                        <div class="flex flex-col text-right">
                            <span class="text-[9px] text-gray-500 font-bold">MARKET TEMP</span>
                            <span class="text-xl font-black italic tracking-tighter" id="temp-value">0.0°</span>
                        </div>
                    </div>
                </div>
                <div class="flex-grow flex flex-col gap-4">
                    <div class="h-3/5 border-b border-gray-800 pb-2"><canvas id="sentimentChart"></canvas></div>
                    <div class="h-2/5 pt-2"><canvas id="volumeChart"></canvas></div>
                </div>
            </div>

            <div class="card h-[600px]">
                <div class="mb-4 border-b border-[#262f45] pb-4">
                    <span class="section-label">Metrics Breakdown</span>
                    <h3 class="text-lg font-bold">분석 데이터 상세 리스트</h3>
                </div>
                <ul id="indicator-list" class="scroll-list space-y-2 overflow-y-auto pr-2"></ul>
            </div>
        </div>

        <div class="card mb-5 h-[350px]">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <span class="section-label">Historical Analysis</span>
                    <h3 class="text-xl font-bold">연준 정책 시그널 트렌드</h3>
                </div>
            </div>
            <div class="flex-grow relative"><canvas id="trendChart"></canvas></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10">
            <div class="card min-h-[300px]"><span class="section-label">빅테크 뉴스</span><div id="news-bigtech" class="text-xs scroll-list overflow-y-auto"></div></div>
            <div class="card min-h-[300px]"><span class="section-label">반도체 소식</span><div id="news-semicon" class="text-xs scroll-list overflow-y-auto"></div></div>
            <div class="card min-h-[300px]"><span class="section-label">금융 소식</span><div id="news-finance" class="text-xs scroll-list overflow-y-auto"></div></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let sentimentChart = null, volumeChart = null, trendChart = null;
        let targetPrice = null;
        let isAlertOn = false;

        // 가격 체크 엔진
        async function checkPrice() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await res.json();
                const currentPrice = parseFloat(data.price);
                document.getElementById('current-btc').innerText = `BTC: $${currentPrice.toLocaleString()}`;
                if (isAlertOn && targetPrice && currentPrice >= targetPrice) triggerAlert();
            } catch (e) { console.error("Price check failed"); }
        }

        function toggleAlert() {
            const input = document.getElementById('alert-price');
            const btn = document.getElementById('alert-btn');
            if (!isAlertOn) {
                targetPrice = parseFloat(input.value);
                if (!targetPrice) return alert("가격을 입력하세요!");
                isAlertOn = true; btn.innerText = "해제"; btn.classList.replace('bg-sky-900', 'bg-red-900'); input.disabled = true;
            } else { stopAlert(); }
        }

        function triggerAlert() { document.getElementById('alert-bar').classList.add('alert-active'); document.getElementById('alert-bar').onclick = stopAlert; }
        function stopAlert() {
            isAlertOn = false; targetPrice = null;
            const bar = document.getElementById('alert-bar'); bar.classList.remove('alert-active'); bar.onclick = null;
            const btn = document.getElementById('alert-btn'); btn.innerText = "설정"; btn.classList.replace('bg-red-900', 'bg-sky-900');
            const input = document.getElementById('alert-price'); input.disabled = false; input.value = "";
        }

        // TV 위젯 로직
        function loadTicker(symbol) {
            const container = document.getElementById('ticker_container'); container.innerHTML = "";
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
            script.async = true;
            script.innerHTML = JSON.stringify({ "symbol": symbol, "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "ko" });
            container.appendChild(script);
        }

        function loadChart(symbol) {
            document.getElementById('chart_box').innerHTML = "";
            new TradingView.widget({
                "width": "100%", "height": 500, "symbol": symbol, "interval": "D", "theme": "dark", "style": "1", "container_id": "chart_box",
                "hide_side_toolbar": true, "allow_symbol_change": false, "save_image": false, "details": false, "hotlist": false, "calendar": false,
                "enable_publishing": false, "overrides": { 
                    "paneProperties.background": "#131722", "paneProperties.vertGridProperties.color": "#262f45", "paneProperties.horzGridProperties.color": "#262f45"
                },
                "studies": [ { "id": "Volume@tv-basicstudies" } ]
            });
        }

        function changeWidget(symbol) { loadTicker(symbol); loadChart(symbol); }

        // 캘린더 렌더링
        async function updateCalendar() {
            try {
                const response = await fetch('./economic_events.json?v=' + Date.now());
                const events = await response.json();
                renderCalendar(events);
                document.getElementById('sync-status').innerText = "LIVE SYNC ACTIVE";
            } catch (err) {
                const dummy = [
                    { "date": "2026-03-12 21:30", "name": "미국 CPI 발표", "importance": "CRITICAL" },
                    { "date": "2026-03-19 03:00", "name": "FOMC 금리 결정", "importance": "CRITICAL" },
                    { "date": "2026-03-21 21:30", "name": "신규 실업수당 청구", "importance": "HIGH" },
                    { "date": "2026-03-25 22:00", "name": "신규 주택 판매", "importance": "MEDIUM" }
                ];
                renderCalendar(dummy);
                document.getElementById('sync-status').innerText = "MARKET WATCHING";
            }
        }

        function renderCalendar(events) {
            const container = document.getElementById('calendar-container');
            container.innerHTML = events.map(ev => {
                const target = new Date(ev.date);
                const diff = target - new Date();
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const dDay = days > 0 ? `D-${days}` : (days === 0 ? "TODAY" : "DONE");
                const colorClass = ev.importance === 'CRITICAL' ? 'border-red-500 text-red-400' : (ev.importance === 'HIGH' ? 'border-orange-500 text-orange-400' : 'border-sky-500 text-sky-400');
                return `<div class="event-card bg-[#0a0f1e] p-4 rounded border border-[#262f45] ${colorClass.split(' ')[0]}"><span class="text-[10px] text-gray-500 block mb-1 font-mono">${ev.date}</span><span class="text-sm font-bold text-white block truncate">${ev.name}</span><div class="flex justify-between items-center mt-3"><span class="text-[9px] font-black opacity-40 uppercase">${ev.importance}</span><span class="text-xs font-mono font-bold ${colorClass.split(' ')[1]}">${dDay}</span></div></div>`;
            }).join('');
        }

        // 터미널 데이터 업데이트 (심리 분석 및 뉴스)
        async function updateTerminalData() {
            try {
                const response = await fetch('./indicators.json?v=' + Date.now());
                const data = await response.json();
                
                // 마켓 온도
                const tempNum = parseFloat(data.market_temp);
                const tempElement = document.getElementById('temp-value');
                tempElement.innerText = data.market_temp + '°';
                tempElement.className = tempNum >= 0 ? "text-xl font-black italic text-sky-400" : "text-xl font-black italic text-red-400";

                const labels = data.indicators.map(i => i.word);
                // 심리 점수 차트
                if (sentimentChart) sentimentChart.destroy();
                sentimentChart = new Chart(document.getElementById('sentimentChart'), {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ label: 'Score', data: data.indicators.map(i => i.sentiment_score), backgroundColor: data.indicators.map(i => i.sentiment_score >= 0 ? 'rgba(56, 189, 248, 0.6)' : 'rgba(239, 68, 68, 0.6)'), borderRadius: 4 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: -10, max: 10, grid: { color: '#262f45' } } } }
                });

                // 언급량 차트
                if (volumeChart) volumeChart.destroy();
                volumeChart = new Chart(document.getElementById('volumeChart'), {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ label: 'Mentions', data: data.indicators.map(i => i.count), backgroundColor: 'rgba(148, 163, 184, 0.4)', borderRadius: 4 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { display: false } } } }
                });

                // 리스트 업데이트
                document.getElementById('indicator-list').innerHTML = data.indicators.map(i => `
                    <li class="flex justify-between items-center p-3 rounded bg-[#1e293b] border-l-4 ${i.status === 'POSITIVE' ? 'border-sky-500' : 'border-red-500'}">
                        <div class="flex flex-col"><span class="font-bold text-white">${i.word}</span><span class="text-[10px] text-gray-500">${i.count} MENTIONS</span></div>
                        <span class="font-mono font-bold ${i.sentiment_score >= 0 ? 'text-sky-400' : 'text-red-400'}">${i.display_score}</span>
                    </li>`).join('');

                // 뉴스 업데이트
                if(data.sector_news) {
                    const updateNews = (id, newsArr) => {
                        const box = document.getElementById(id); if(!newsArr) return;
                        box.innerHTML = newsArr.map(n => `<div class="news-item"><a href="${n.link}" target="_blank" class="hover:text-sky-400 block mb-1">▶ ${n.title}</a><span class="text-[9px] text-gray-600">${n.date || ''}</span></div>`).join('');
                    };
                    updateNews('news-bigtech', data.sector_news['BIG TECH']); updateNews('news-semicon', data.sector_news['SEMICON']); updateNews('news-finance', data.sector_news['FINANCE']);
                }
            } catch (err) { console.error(err); }
        }

        async function loadTrendData() {
            try {
                const response = await fetch('./historical_data.json?v=' + Date.now());
                const historyData = await response.json();
                if (trendChart) trendChart.destroy();
                trendChart = new Chart(document.getElementById('trendChart'), {
                    type: 'line',
                    data: {
                        labels: historyData.map(d => d.date),
                        datasets: [{ label: 'Sentiment', data: historyData.map(d => d.score), borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)', fill: true, tension: 0.4 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#262f45' } }, x: { grid: { display: false } } } }
                });
            } catch (err) { console.error(err); }
        }

        const calScroll = document.getElementById('calendar-container');
        calScroll.addEventListener('wheel', (e) => { e.preventDefault(); calScroll.scrollLeft += e.deltaY; });

        window.onload = () => { 
            changeWidget('BINANCE:BTCUSDT'); 
            updateTerminalData(); 
            loadTrendData();
            updateCalendar(); 
            setInterval(checkPrice, 2000); 
            setInterval(updateTerminalData, 30000);
            setInterval(updateCalendar, 30000);
        };
    </script>
</body>
</html>
