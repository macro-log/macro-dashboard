<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL 9 | 핵심 데이터 터미널</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #0a0f1e; --bg-card: #161e31; --accent: #38bdf8;
            --text-main: #f1f5f9; --text-dim: #94a3b8; --border: #262f45;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; }
        header { padding: 15px 30px; background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        .main-layout { display: flex; flex-direction: column; padding: 20px; max-width: 1400px; margin: 0 auto; gap: 15px; }
        .nav-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        button { padding: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-dim); border-radius: 4px; font-weight: 700; font-size: 0.8rem; transition: 0.2s; }
        button:hover { background: var(--accent); color: var(--bg-main); }
        #ticker_container { height: 75px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        #chart_box { height: 600px; background: var(--bg-card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .analysis-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 10px; }
        .card { background: var(--bg-card); padding: 24px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .section-label { color: var(--accent); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .scroll-list { max-height: 380px; overflow-y: auto; padding-right: 5px; }
        .scroll-list::-webkit-scrollbar { width: 4px; }
        .scroll-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SIGNAL 9</div>
        <div style="font-size: 0.8rem; color: var(--text-dim); font-weight: 600;">TERMINAL V2.0</div>
    </header>
    
    <div class="main-layout">
        <div class="nav-group">
            <button onclick="changeWidget('BINANCE:BTCUSDT')">비트코인</button>
            <button onclick="changeWidget('AMEX:SPY')">S&P 500 (SPY)</button>
            <button onclick="changeWidget('NASDAQ:QQQ')">나스닥 100 (QQQ)</button>
            <button onclick="changeWidget('AMEX:DIA')">다우존스 (DIA)</button>
            <button onclick="changeWidget('US10Y')">미국 10년 국채</button>
            <button onclick="changeWidget('US02Y')">미국 2년 국채</button>
            <button onclick="changeWidget('TVC:GOLD')">금 (GOLD)</button>
            <button onclick="changeWidget('TVC:USOIL')">WTI 유가</button>
        </div>

        <div id="ticker_container"></div>

        <div id="chart_box"></div>

        <div class="analysis-grid">
            <div class="card h-[520px]">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-5">
                        <div>
                            <span class="section-label">Sentiment Analysis</span>
                            <h3 class="text-xl font-bold" id="chart-title">FOMC 상위 10개 키워드</h3>
                        </div>
                        <div class="flex items-center gap-2 bg-[#0a0f1e] px-3 py-1.5 rounded border border-[#262f45]">
                            <span class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Temp</span>
                            <span class="text-xl font-black italic tracking-tighter" id="temp-value">0.0°</span>
                            <div class="w-10 h-1 bg-gray-800 rounded-full overflow-hidden">
                                <div id="temp-bar" class="h-full bg-gray-500 transition-all duration-700" style="width: 50%;"></div>
                            </div>
                        </div>
                    </div>
                    <button onclick="toggleDataType()" id="toggle-btn" class="!px-3 !py-1 !text-[10px] !bg-[#262f45] !text-white !border-none hover:!bg-[#38bdf8]">데이터 전환</button>
                </div>
                <div class="flex-grow">
                    <canvas id="keywordChart"></canvas>
                </div>
            </div>

            <div class="card h-[520px]">
                <div class="mb-6 border-b border-[#262f45] pb-4">
                    <span class="section-label">Detailed Metrics</span>
                    <h3 class="text-lg font-bold" id="list-title">상세 데이터 변화</h3>
                </div>
                <ul id="indicator-list" class="scroll-list space-y-2"></ul>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        let currentDataType = 'fomc'; 
        let rawData = null; 
        let myChart = null;

        // 1. 티커 로드
        function loadTicker(symbol) {
            const container = document.getElementById('ticker_container');
            container.innerHTML = "";
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
            script.async = true;
            script.innerHTML = JSON.stringify({ "symbol": symbol, "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "ko" });
            container.appendChild(script);
        }

        // 2. 메인 차트 로드 (거래량 겹침 방지 포함)
        function loadChart(symbol) {
            document.getElementById('chart_box').innerHTML = "";
            new TradingView.widget({
                "width": "100%", "height": 600, "symbol": symbol, "interval": "D",
                "timezone": "Asia/Seoul", "theme": "dark", "style": "1", "locale": "ko",
                "container_id": "chart_box", "hide_side_toolbar": false, "withdateranges": true,
                "overrides": {
                    "paneProperties.topMargin": 22, // 캔들을 위에서 살짝 떼어 거래량과 분리
                    "mainSeriesProperties.candleStyle.upColor": "#089981",
                    "mainSeriesProperties.candleStyle.downColor": "#f23645"
                }
            });
        }

        function changeWidget(symbol) { loadTicker(symbol); loadChart(symbol); }

        function toggleDataType() {
            currentDataType = (currentDataType === 'fomc') ? 'company' : 'fomc';
            document.getElementById('chart-title').innerText = (currentDataType === 'fomc') ? "FOMC 상위 10개 키워드" : "기업 섹터별 데이터 분석";
            updateUI();
        }

        // 3. 데이터 연동 및 UI 업데이트
        function updateUI() {
            if (!rawData) return;
            const indicators = rawData.indicators || [];
            
            // 온도 및 게이지 업데이트
            const temp = rawData.market_temp || 0;
            const tempVal = document.getElementById('temp-value');
            tempVal.innerText = (temp > 0 ? '+' : '') + temp + '°';
            const bar = document.getElementById('temp-bar');
            bar.style.width = ((temp + 100) / 2).toFixed(1) + '%';
            
            if(temp >= 15) { tempVal.className = "text-xl font-black italic tracking-tighter text-sky-400"; bar.className = "h-full bg-sky-500"; }
            else if(temp <= -15) { tempVal.className = "text-xl font-black italic tracking-tighter text-red-500"; bar.className = "h-full bg-red-500"; }
            else { tempVal.className = "text-xl font-black italic tracking-tighter text-gray-300"; bar.className = "h-full bg-gray-500"; }

            const filteredData = indicators.filter(item => item.type === currentDataType);
            renderChartAndList(filteredData);
        }

        // 4. 차트 및 리스트 렌더링
        function renderChartAndList(data) {
            const listElement = document.getElementById('indicator-list');
            listElement.innerHTML = "";
            const ctx = document.getElementById('keywordChart').getContext('2d');
            
            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(k => k.word),
                    datasets: [{
                        data: data.map(k => k.sentiment_score),
                        backgroundColor: data.map(k => k.sentiment_score >= 0 ? 'rgba(56, 189, 248, 0.5)' : 'rgba(239, 68, 68, 0.5)'),
                        borderColor: data.map(k => k.sentiment_score >= 0 ? '#38bdf8' : '#ef4444'),
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { grid: { color: '#262f45' }, ticks: { color: '#94a3b8' }, min: -10, max: 10 },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            data.forEach(item => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center p-3 rounded bg-[#1e293b] border border-[#262f45] hover:border-[#38bdf8] transition-all';
                const score = item.sentiment_score;
                li.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-bold text-sm text-slate-100">${item.word}</span>
                        <span class="text-[10px] text-gray-500">지표 변화량: <b class="text-slate-300">${item.score_diff > 0 ? '+' : ''}${item.score_diff}</b></span>
                    </div>
                    <span class="text-sm font-mono font-bold ${score >= 0 ? 'text-sky-400' : 'text-red-400'}">${score > 0 ? '+' : ''}${score}</span>
                `;
                listElement.appendChild(li);
            });
        }

        window.onload = function() {
            changeWidget('BINANCE:BTCUSDT');
            // 캐시 방지를 위해 시간값 파라미터 추가
            fetch('PROJECT/indicators.json?v=' + new Date().getTime())
                .then(r => r.json())
                .then(d => { rawData = d; updateUI(); })
                .catch(err => console.error("데이터 로드 에러:", err));
        };
    </script>
</body>
</html>
