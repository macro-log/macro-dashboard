<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL 9 | 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #030712; 
            color: #f1f5f9;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: screen;
            height: 100vh;
        }
        .login-card {
            background: #161e31;
            border: 1px solid #262f45;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="login-card p-10 md:p-16 rounded-[2.5rem] w-full max-w-md text-center mx-4">
        <div class="flex justify-center mb-6">
            <div class="w-2 h-10 bg-[#38bdf8] rounded-full mr-3"></div>
            <h1 class="text-4xl font-black text-white tracking-tighter">SIGNAL 9</h1>
        </div>
        
        <p class="text-gray-400 font-medium mb-12">터미널 상황실에 접속하기 위해<br>계정을 선택해주세요.</p>

        <div class="space-y-4">
            <button onclick="fakeLogin('google')" class="w-full flex items-center justify-center gap-3 bg-white text-gray-900 py-4 rounded-2xl font-bold hover:bg-gray-200 transition-all active:scale-95">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                Google로 계속하기
            </button>

            <button onclick="fakeLogin('apple')" class="w-full flex items-center justify-center gap-3 bg-black text-white py-4 rounded-2xl font-bold hover:bg-gray-800 transition-all active:scale-95 border border-gray-700">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="w-5 h-5 invert">
                Apple로 계속하기
            </button>
        </div>

        <p class="mt-10 text-[10px] text-gray-500 leading-relaxed">
            로그인 시 SIGNAL 9의 <span class="underline">이용약관</span> 및 <span class="underline">개인정보처리방침</span>에 동의하게 됩니다.
        </p>
    </div>

    <script>
        function fakeLogin(provider) {
            console.log(provider + " 로그인 시도 중...");
            // 1. 브라우저에 "로그인 됨" 상태 저장
            localStorage.setItem('s9_user', 'active');
            
            // 2. 대시보드로 이동
            alert(provider + " 계정으로 연결되었습니다!");
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
