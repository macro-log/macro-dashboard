name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U google-generativeai yfinance pandas requests deep-translator

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import yfinance as yf
          import json
          import os
          import requests
          import re
          import datetime
          import google.generativeai as genai
          from deep_translator import GoogleTranslator
          from xml.etree import ElementTree

          # 1. 환경 설정
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. 9대 지표 스코어 계산 (온도 -2.5 고정용)
          def calculate_master_score():
              try:
                  tickers = ['BTC-USD', 'SPY', 'QQQ', 'DIA', 'DX-Y.NYB', '^VIX', 'GC=F', 'HYG', 'XLY', 'XLP', '^TNX', '^TYX']
                  raw = {t: yf.Ticker(t).history(period="180d") for t in tickers}
                  def get_s(val, mid, span): return max(0, min(100, (val - (mid - span)) * (100 / (2 * span))))
                  s1 = get_s(35 - raw['^VIX']['Close'].iloc[-1], 20, 15) * 0.25
                  s2 = get_s(-(((raw['GC=F']['Close'].iloc[-1]/raw['GC=F']['Close'].iloc[-2])-1)*100), 0, 2) * 0.15
                  s3 = get_s(raw['SPY']['Close'].iloc[-1]/raw['SPY']['Close'].rolling(120).mean().iloc[-1]*100, 100, 5) * 0.15
                  s4 = get_s(((raw['BTC-USD']['Close'].iloc[-1]/raw['BTC-USD']['Close'].iloc[-2])-1)*100, 0, 3) * 0.10
                  s5 = get_s(-(((raw['DX-Y.NYB']['Close'].iloc[-1]/raw['DX-Y.NYB']['Close'].iloc[-2])-1)*100), 0, 1) * 0.10
                  cons = (raw['XLY']['Close'].iloc[-1]/raw['XLP']['Close'].iloc[-1]) / (raw['XLY']['Close'].iloc[-2]/raw['XLP']['Close'].iloc[-2]) - 1
                  s6 = get_s(cons*100, 0, 1) * 0.10
                  s7 = get_s(raw['HYG']['Close'].iloc[-1]/raw['HYG']['Close'].rolling(20).mean().iloc[-1]*100, 100, 2) * 0.075
                  def get_mfi(t): return (raw[t]['Close'].iloc[-1] * raw[t]['Volume'].iloc[-1]) / ((raw[t]['Close'] * raw[t]['Volume']).rolling(20).mean().iloc[-1] + 1e-9)
                  s8 = get_s(get_mfi('QQQ') / get_mfi('DIA'), 1, 0.5) * 0.04
                  s9 = get_s(raw['^TYX']['Close'].iloc[-1] - raw['^TNX']['Close'].iloc[-1], 0.2, 0.5) * 0.035
                  return int(s1+s2+s3+s4+s5+s6+s7+s8+s9)
              except: return 50
          
          master_score = calculate_master_score()

          # 3. 뉴스 및 AI 브리핑 (기존 로직 보존)
          sector_map = {"시장 종합": ["market"], "빅테크": ["tech"], "반도체": ["nvidia"], "금리/매크로": ["fed"], "에너지/원자재": ["oil"], "가상자산": ["bitcoin"]}
          def fetch_news():
              try:
                  res = requests.get("https://news.google.com/rss/search?q=Global+Market+Economy&hl=en-US&gl=US&ceid=US:en", timeout=15)
                  return [it.find('title').text for it in ElementTree.fromstring(res.content).findall('.//item')[:50]]
              except: return []

          all_headlines = fetch_news()
          dynamic_news = {}
          ai_briefing = "실시간 시장 데이터를 분석하고 있습니다."
          try:
              model = genai.GenerativeModel('models/gemini-2.0-flash')
              prompt = f"당신은 투자 전문 분석가 'SIGNAL 9'입니다. 뉴스 분류 및 'briefing' 키에 3줄 요약을 한국어로 담아 JSON 응답하세요. 뉴스:\n{chr(10).join(all_headlines)}"
              response = model.generate_content(prompt)
              json_match = re.search(r'\{.*\}', response.text, re.DOTALL)
              if json_match:
                  dynamic_news = json.loads(json_match.group())
                  ai_briefing = dynamic_news.get("briefing", ai_briefing)
          except:
              for s in sector_map.keys(): dynamic_news[s] = [{"title": "분석 지연", "summary": "잠시 후 업데이트"}]

          # 4. indicators.json 저장 (브리핑/스코어/온도 연동)
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "last_updated": sync_time,
                  "master_score": master_score,
                  "market_temp": "-2.5", # 온도 고정
                  "ai_summary": ai_briefing,
                  "dynamic_news": dynamic_news,
                  "fomc_indicators": [{"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52}]
              }, f, ensure_ascii=False, indent=4)

          # 5. [강력 수정] 차트 데이터 수집 로직 - 짤림 방지 및 10년치 궤적 포함
          try:
              # 형님이 원하셨던 차트 티커들
              chart_tickers = {
                  'BTC': 'BTC-USD', 'SPY': 'SPY', 'QQQ': 'QQQ', 'DIA': 'DIA', 
                  'US10Y': '^TNX', 'US02Y': '^IRX', 'OIL': 'CL=F', 'GOLD': 'GC=F', 
                  'KOSPI': '^KS11', 'USDKRW': 'KRW=X'
              }
              chart_data = {}
              for name, tkr in chart_tickers.items():
                  try:
                      tk = yf.Ticker(tkr)
                      # 당일 궤적 (5일치 받아와서 마지막 영업일 추출)
                      df_day = tk.history(period="5d", interval="15m")
                      if not df_day.empty:
                          last_date = df_day.index[-1].date()
                          last_day_df = df_day[df_day.index.date == last_date]
                          day_labels = last_day_df.index.strftime('%H:%M').tolist()
                          day_prices = [round(p, 2) for p in last_day_df['Close'].tolist()]
                      else:
                          day_labels, day_prices = [], []

                      # 10년 궤적 (전체 흐름용)
                      df_full = tk.history(period="10y", interval="1d")
                      full_labels = df_full.index.strftime('%Y-%m-%d').tolist()
                      full_prices = [round(p, 2) for p in df_full['Close'].tolist()]

                      chart_data[name] = {
                          "day": {"labels": day_labels, "prices": day_prices},
                          "full": {"labels": full_labels, "prices": full_prices}
                      }
                      print(f"📊 {name} 차트 수집 완료")
                  except Exception as e: 
                      print(f"⚠️ {name} 차트 에러: {e}")
                      continue

              with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
                  json.dump(chart_data, f, ensure_ascii=False)
          except Exception as e:
              print(f"❌ 전체 차트 엔진 오류: {e}")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "차트 부활 + AI 브리핑 + 9대 지표 통합 완료 🚀" || echo "No changes"
          git push