name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U google-generativeai yfinance pandas requests

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import warnings
          warnings.filterwarnings("ignore", category=FutureWarning)
          import yfinance as yf
          import json, os, requests, re, datetime, urllib.request
          import google.generativeai as genai
          from xml.etree import ElementTree

          # 1. 환경 설정 및 시간 계산 (유지)
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. 실시간 마켓 데이터 수집 (유지)
          tickers_list = ['BTC-USD', 'SPY', 'QQQ', 'DIA', 'DX-Y.NYB', '^VIX', 'GC=F', 'HYG', 'XLY', 'XLP', '^TNX', '^TYX']
          raw = {t: yf.Ticker(t).history(period="180d") for t in tickers_list}
          
          def get_chg(t): return round(((raw[t]['Close'].iloc[-1] / raw[t]['Close'].iloc[-2]) - 1) * 100, 2)
          current_vix = round(raw['^VIX']['Close'].iloc[-1], 2)
          market_stats = f"VIX: {current_vix}, S&P500: {get_chg('SPY')}%, Nasdaq: {get_chg('QQQ')}%, BTC: {get_chg('BTC-USD')}%"

          # [엔진] 9대 지표 실시간 스코어 계산 (유지)
          def calculate_master_score():
              try:
                  def get_s(val, mid, span): return max(0, min(100, (val - (mid - span)) * (100 / (2 * span))))
                  s1 = get_s(35 - current_vix, 20, 15) * 0.25
                  s2 = get_s(-((raw['GC=F']['Close'].iloc[-1]/raw['GC=F']['Close'].iloc[-2]-1)*100), 0, 2) * 0.15
                  s3 = get_s(raw['SPY']['Close'].iloc[-1]/raw['SPY']['Close'].rolling(120).mean().iloc[-1]*100, 100, 5) * 0.15
                  s4 = get_s(get_chg('BTC-USD'), 0, 3) * 0.10
                  s5 = get_s(-get_chg('DX-Y.NYB'), 0, 1) * 0.10
                  cons = (raw['XLY']['Close'].iloc[-1]/raw['XLP']['Close'].iloc[-1]) / (raw['XLY']['Close'].iloc[-2]/raw['XLP']['Close'].iloc[-2]) - 1
                  s6 = get_s(cons*100, 0, 1) * 0.10
                  s7 = get_s(raw['HYG']['Close'].iloc[-1]/raw['HYG']['Close'].rolling(20).mean().iloc[-1]*100, 100, 2) * 0.075
                  def get_mfi(t): return (raw[t]['Close'].iloc[-1] * raw[t]['Volume'].iloc[-1]) / ((raw[t]['Close'] * raw[t]['Volume']).rolling(20).mean().iloc[-1] + 1e-9)
                  s8 = get_s(get_mfi('QQQ') / get_mfi('DIA'), 1, 0.5) * 0.04
                  s9 = get_s(raw['^TYX']['Close'].iloc[-1] - raw['^TNX']['Close'].iloc[-1], 0.2, 0.5) * 0.035
                  return int(s1+s2+s3+s4+s5+s6+s7+s8+s9)
              except: return 50
          master_score = calculate_master_score()

          # ★ [신규 수비 로직] 블랙 스완 레이더 점수 (VIX 가속도 + 신용 스프레드)
          def calculate_black_swan_risk():
              try:
                  v_series = raw['^VIX']['Close']
                  v_accel = max(0, (v_series.iloc[-1] / v_series.tail(5).mean() - 1) * 100)
                  h_series = raw['HYG']['Close']
                  s_credit = min(100, max(0, (1 - h_series.iloc[-1] / h_series.tail(20).mean()) * 1000))
                  return int(v_accel * 0.4 + s_credit * 0.6)
              except: return 20
          black_swan_score = calculate_black_swan_risk()

          # ★ [신규 공격 로직] Value Hunter 5대 필터 (EPS 10%, PEG 1.0, ROE 15%, FCF 5%, Debt 100%)
          scan_tickers = ['AAPL', 'MSFT', 'NVDA', 'TSLA', 'GOOGL', 'AMZN', 'META', 'AVGO', 'COST', 'NFLX', 'SMCI', 'ARM', 'TSM', 'ASML']
          undervalued_stocks = []
          for t in scan_tickers:
              try:
                  tk = yf.Ticker(t)
                  info = tk.info
                  # 5대 지표 추출
                  eps_g = info.get('earningsGrowth', 0)
                  peg = info.get('pegRatio', 2)
                  roe = info.get('returnOnEquity', 0)
                  fcf_y = info.get('freeCashflow', 0) / (info.get('marketCap', 1) or 1)
                  debt = info.get('debtToEquity', 200)

                  # 형님의 5대 엄격 필터링 적용
                  if eps_g >= 0.10 and peg <= 1.0 and roe >= 0.15 and fcf_y >= 0.05 and debt <= 100:
                      # ROE가 높을수록 가중치를 주는 스코어링
                      roe_bonus = 2.5 if roe > 0.5 else (1.5 if roe > 0.25 else 1.0)
                      score = round(((eps_g * 100) + (roe * 100 * roe_bonus) + (1.2 - peg) * 50), 1)
                      undervalued_stocks.append({
                          "ticker": t, "score": score, "price": f"${info.get('currentPrice')}", 
                          "is_premium": False, "reason": "5-Filter Verified"
                      })
              except: continue
          
          # 상위 3개 선별 및 유료 잠금 (1등만 무료)
          top_undervalued = sorted(undervalued_stocks, key=lambda x: x['score'], reverse=True)[:3]
          for i, stock in enumerate(top_undervalued):
              if i > 0: stock['is_premium'] = True

          # 3. 연준 심리 데이터 (유지)
          fomc_data = [{"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52}, {"word": "RATE", "sentiment_score": 0.4, "status": "NEUTRAL", "display_score": "+0.4", "count": 48}, {"word": "POLICY", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 34}, {"word": "RISKS", "sentiment_score": -0.5, "status": "NEUTRAL", "display_score": "-0.5", "count": 21}, {"word": "GROWTH", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 20}, {"word": "LABOR", "sentiment_score": -0.0, "status": "NEUTRAL", "display_score": "-0.0", "count": 18}, {"word": "CREDIT", "sentiment_score": 0.2, "status": "NEUTRAL", "display_score": "+0.2", "count": 13}, {"word": "GDP", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 11}, {"word": "PRICES", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 11}, {"word": "EMPLOYMENT", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 7}, {"word": "ECONOMY", "sentiment_score": -0.7, "status": "NEUTRAL", "display_score": "-0.7", "count": 5}, {"word": "STABILITY", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 3}]

          # 4. [프리미엄] 뉴스 수집 (유지)
          def fetch_premium_news():
              headlines = []
              urls = ["https://feeds.a.dj.com/rss/RSSMarketsMain.xml", "https://news.google.com/rss/search?q=when:1d+AND+(source:Bloomberg+OR+source:Reuters)+market+finance&hl=en-US&gl=US&ceid=US:en"]
              headers = {'User-Agent': 'Mozilla/5.0'}
              for url in urls:
                  try:
                      req = urllib.request.Request(url, headers=headers)
                      res = urllib.request.urlopen(req, timeout=10)
                      root = ElementTree.fromstring(res.read())
                      for item in root.findall('.//item')[:15]: headlines.append(item.find('title').text)
                  except: pass
              return list(set(headlines))

          all_headlines = fetch_premium_news()

          # 5. AI 분석 (리스트 요약 형태 유지 및 블랙스완 분석 추가)
          dynamic_news = {}
          ai_briefing = ["데이터 동기화 중입니다."]
          risk_reason = "시장 지표 안정 유지"
          
          try:
              model = genai.GenerativeModel('gemini-2.0-flash')
              prompt = f"""
              당신은 월스트리트 헤지펀드 전략가입니다. 다음 데이터를 분석해 JSON으로 응답하세요.
              [시장 상태]: VIX {current_vix}, 블랙스완 위험도 {black_swan_score}%
              [저평가 종목]: {', '.join([s['ticker'] for s in top_undervalued])}
              [헤드라인]: {chr(10).join(all_headlines[:20])}

              요구사항:
              1. briefing은 반드시 날카로운 3줄 요약 리스트여야 함.
              2. swan_reason은 블랙 스완 위험을 높이는 단 하나의 원인을 자연스러운 한국어 의역으로 작성.

              {{
                  "briefing": ["요약1", "요약2", "요약3"],
                  "swan_reason": "원인 1줄",
                  "dynamic_news": {{ "거시경제": [...], "주식시장": [...] }}
              }}
              """
              response = model.generate_content(prompt, generation_config={"response_mime_type": "application/json"})
              data = json.loads(response.text)
              ai_briefing = data.get("briefing", ai_briefing)
              risk_reason = data.get("swan_reason", risk_reason)
              dynamic_news = data.get("dynamic_news", {})
          except: pass

          # 6. indicators.json 저장 (신규 필드 포함)
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "last_updated": sync_time, 
                  "master_score": master_score, 
                  "black_swan_score": black_swan_score,
                  "risk_reason": risk_reason,
                  "undervalued": top_undervalued,
                  "ai_summary": ai_briefing, 
                  "fomc_indicators": fomc_data, 
                  "dynamic_news": dynamic_news
              }, f, ensure_ascii=False, indent=4)

          # 7. 차트 엔진 (유지)
          try:
              chart_tickers = {'BTC': 'BTC-USD', 'SPY': 'SPY', 'QQQ': 'QQQ', 'DIA': 'DIA', 'US10Y': '^TNX', 'USDKRW': 'KRW=X'}
              chart_data = {}
              for name, tkr in chart_tickers.items():
                  try:
                      tk = yf.Ticker(tkr)
                      def sync_data(df, label_fmt):
                          if df.empty: return {"labels": [], "prices": []}
                          labels = df.index.strftime(label_fmt).tolist()
                          prices = [round(float(p), 2) for p in df['Close'].tolist()]
                          return {"labels": labels[:min(len(labels), len(prices))], "prices": prices[:min(len(labels), len(prices))]}
                      d_raw = tk.history(period="7d", interval="15m")
                      chart_data[name] = {
                          "day": sync_data(d_raw[d_raw.index.date == d_raw.index[-1].date()], '%H:%M') if not d_raw.empty else {"labels":[],"prices":[]},
                          "week": sync_data(tk.history(period="1mo", interval="1h").tail(168), '%m-%d %H:00'),
                          "month": sync_data(tk.history(period="6mo", interval="1d").tail(30), '%m-%d'),
                          "year": sync_data(tk.history(period="2y", interval="1d").tail(365), '%Y-%m'),
                          "long": sync_data(tk.history(period="max", interval="1wk"), '%Y')
                      }
                  except: continue
              with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
                  json.dump(chart_data, f, ensure_ascii=False)
          except: pass
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "블랙스완 레이더 및 EPS 10% 밸류헌터 알파 엔진 탑재 🚀" || echo "No changes"
          git push