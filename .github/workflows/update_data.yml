name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U google-generativeai yfinance pandas requests deep-translator

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import yfinance as yf
          import json
          import os
          import requests
          import re
          import datetime
          import google.generativeai as genai
          from deep_translator import GoogleTranslator
          from email.utils import parsedate_to_datetime
          from xml.etree import ElementTree

          # 1. 환경 설정
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. 형님 오리지널 데이터 (보존)
          fomc_data = [{"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52}, {"word": "RATE", "sentiment_score": 0.4, "status": "NEUTRAL", "display_score": "+0.4", "count": 48}, {"word": "POLICY", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 34}, {"word": "RISKS", "sentiment_score": -0.5, "status": "NEUTRAL", "display_score": "-0.5", "count": 21}, {"word": "GROWTH", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 20}, {"word": "LABOR", "sentiment_score": -0.0, "status": "NEUTRAL", "display_score": "-0.0", "count": 18}, {"word": "CREDIT", "sentiment_score": 0.2, "status": "NEUTRAL", "display_score": "+0.2", "count": 13}, {"word": "GDP", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 11}, {"word": "PRICES", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 11}, {"word": "EMPLOYMENT", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 7}, {"word": "ECONOMY", "sentiment_score": -0.7, "status": "NEUTRAL", "display_score": "-0.7", "count": 5}, {"word": "STABILITY", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 3}]

          # 3. 뉴스 수집 엔진
          def fetch_headlines():
              urls = ["https://news.google.com/rss/search?q=Global+Market+Economy&hl=en-US&gl=US&ceid=US:en"]
              headlines = []
              try:
                  res = requests.get(urls[0], timeout=10)
                  tree = ElementTree.fromstring(res.content)
                  for it in tree.findall('.//item')[:20]:
                      headlines.append(it.find('title').text)
              except: pass
              return headlines

          all_headlines = fetch_headlines()

          # 4. 3중 우회 AI 분석 엔진 (429 에러 완벽 대비)
          dynamic_news = {}
          success = False
          
          # [우회 1단계: 모델 순차 시도]
          for model_name in ['gemini-2.0-flash', 'gemini-1.5-flash', 'gemini-1.5-flash-8b']:
              if success: break
              try:
                  print(f"🔄 {model_name} 모델로 분석 시도 중...")
                  model = genai.GenerativeModel(model_name)
                  prompt = f"Analyze these news and provide 6 sectors (시장 종합, 빅테크, 반도체, 금리/매크로, 에너지/원자재, 가상자산) in Korean JSON: {chr(10).join(all_headlines)}"
                  response = model.generate_content(prompt)
                  clean_text = response.text.replace('```json', '').replace('```', '').strip()
                  json_match = re.search(r'\{.*\}', clean_text, re.DOTALL)
                  if json_match:
                      dynamic_news = json.loads(json_match.group())
                      success = True
                      print(f"✅ {model_name} 분석 성공!")
              except Exception as e:
                  print(f"⚠️ {model_name} 실패: {e}")

          # [우회 2단계: AI 완전 중단 시 번역기 투입]
          if not success:
              print("🚨 모든 AI 모델 한도 초과! 번역기 모드로 전환합니다.")
              try:
                  translator = GoogleTranslator(source='en', target='ko')
                  # 헤드라인 6개를 각각의 섹터에 강제로 배정
                  sectors = ["시장 종합", "빅테크", "반도체", "금리/매크로", "에너지/원자재", "가상자산"]
                  for i, sector in enumerate(sectors):
                      raw_text = all_headlines[i] if i < len(all_headlines) else "새로운 소식을 기다리고 있습니다."
                      dynamic_news[sector] = f"[실시간 속보] {translator.translate(raw_text)}"
              except:
                  dynamic_news = {k: "현재 뉴스 데이터 동기화 중입니다." for k in sectors}

          # 5. indicators.json 저장 (풀옵션 구조 유지)
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "last_updated": sync_time,
                  "master_score": 72,
                  "market_temp": "-2.5",
                  "ai_summary": "글로벌 뉴스 분석 엔진이 최신 시황을 업데이트했습니다.",
                  "fomc_indicators": fomc_data,
                  "engine_indicators": fomc_data,
                  "dynamic_news": dynamic_news
              }, f, ensure_ascii=False, indent=4)

          # 6. 차트/일정 수집 (원본 보존)
          try:
              chart_data = {}
              for name, tkr in {'BTC': 'BTC-USD', 'SPY': 'SPY', 'QQQ': 'QQQ'}.items():
                  tk = yf.Ticker(tkr)
                  df = tk.history(period="1d", interval="15m")
                  chart_data[name] = {"day": {"labels": df.index.strftime('%H:%M').tolist(), "prices": [round(p, 2) for p in df['Close'].tolist()]}}
              with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
                  json.dump(chart_data, f, ensure_ascii=False)
          except: pass
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "AI 한도 초과 시 번역기 우회 엔진 장착 🚀" || echo "No changes"
          git push