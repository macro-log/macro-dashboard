name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance pandas google-generativeai requests deep-translator

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import yfinance as yf
          import json
          import os
          import requests
          import re
          import datetime
          from xml.etree import ElementTree
          from deep_translator import GoogleTranslator
          import google.generativeai as genai

          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          translator = GoogleTranslator(source='auto', target='ko')

          # 1. 🚨 형님의 오리지널 12개 연준 키워드 (분석 리스트용) 🚨
          fomc_data = [
              {"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52},
              {"word": "RATE", "sentiment_score": 0.4, "status": "NEUTRAL", "display_score": "+0.4", "count": 48},
              {"word": "POLICY", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 34},
              {"word": "RISKS", "sentiment_score": -0.5, "status": "NEUTRAL", "display_score": "-0.5", "count": 21},
              {"word": "GROWTH", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 20},
              {"word": "LABOR", "sentiment_score": -0.0, "status": "NEUTRAL", "display_score": "-0.0", "count": 18},
              {"word": "CREDIT", "sentiment_score": 0.2, "status": "NEUTRAL", "display_score": "+0.2", "count": 13},
              {"word": "GDP", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 11},
              {"word": "PRICES", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 11},
              {"word": "EMPLOYMENT", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 7},
              {"word": "ECONOMY", "sentiment_score": -0.7, "status": "NEUTRAL", "display_score": "-0.7", "count": 5},
              {"word": "STABILITY", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 3}
          ]

          # 2. 뉴스 수집 및 번역
          sectors = {
              "BIG TECH": "https://news.google.com/rss/search?q=Apple+Nvidia+Microsoft+Stock&hl=en-US&gl=US&ceid=US:en",
              "FINANCE": "https://news.google.com/rss/search?q=JPMorgan+Goldman+Sachs+FED&hl=en-US&gl=US&ceid=US:en"
          }
          sector_news_data = {}
          for name, url in sectors.items():
              try:
                  res = requests.get(url, timeout=10)
                  tree = ElementTree.fromstring(res.content)
                  sector_news_data[name] = [{"title": translator.translate(it.find('title').text), "link": it.find('link').text, "date": it.find('pubDate').text[:16]} for it in tree.findall('.//item')[:3]]
              except: sector_news_data[name] = []

          # 3. AI 시장 요약 브리핑
          ai_summary = "데이터 분석 완료."
          try:
              news_text = "\n".join([n['title'] for n in sector_news_data.get("BIG TECH", [])])
              response = genai.GenerativeModel('gemini-1.5-flash').generate_content(f"뉴스 요약해줘: {news_text}")
              ai_summary = response.text
          except: pass

          # 4. indicators.json 저장 (12개 키워드 리스트 고수)
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "master_score": 72, 
                  "market_temp": "-2.5", 
                  "ai_summary": ai_summary, 
                  "fomc_indicators": fomc_data, 
                  "engine_indicators": fomc_data, 
                  "sector_news": sector_news_data
              }, f, ensure_ascii=False, indent=4)

          # 5. 로봇 차트 데이터 수집
          try:
              chart_tickers = {'BTC': 'BTC-USD', 'SPY': 'SPY', 'QQQ': 'QQQ', 'DIA': 'DIA', 'US10Y': '^TNX', 'US02Y': '^FVX', 'OIL': 'CL=F', 'GOLD': 'GC=F', 'KOSPI': '^KS11', 'USDKRW': 'KRW=X'}
              chart_data = {}
              for name, ticker in chart_tickers.items():
                  try:
                      tk = yf.Ticker(ticker)
                      df_day = tk.history(period="1d", interval="5m")
                      df_full = tk.history(period="10y", interval="1d")
                      chart_data[name] = {
                          "day": {"labels": df_day.index.strftime('%H:%M').tolist(), "prices": [round(p, 2) for p in df_day['Close'].tolist()]},
                          "full": {"labels": df_full.index.strftime('%Y-%m-%d').tolist(), "prices": [round(p, 2) for p in df_full['Close'].tolist()]}
                      }
                  except: continue
              with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
                  json.dump(chart_data, f, ensure_ascii=False)
          except: pass

          # 6. 🚨 자동화 일정 수집 엔진 (economic_events.json / 하루 5개 이상 감당) 🚨
          try:
              today = datetime.date.today()
              auto_events = []
              # 기업 실적 자동 수집
              for s in ['NVDA', 'TSLA', 'AAPL', 'MSFT', 'AMZN', 'GOOGL', 'META']:
                  try:
                      cal = yf.Ticker(s).calendar
                      if cal is not None and 'Earnings Date' in cal:
                          e_date = cal['Earnings Date'][0].date()
                          if e_date >= today:
                              auto_events.append({"date": e_date.strftime('%Y-%m-%d'), "name": f"{s} 실적", "importance": "NORMAL", "type": "EARNINGS"})
                  except: continue
              # 매크로 핵심 일정 (계산 로직)
              for m in [{"n": "미국 CPI", "d": 12}, {"n": "FOMC 결정", "d": 20}, {"n": "고용지표", "d": 5}]:
                  try:
                      m_date = datetime.date(today.year, today.month, m['d'])
                      if m_date >= today:
                          auto_events.append({"date": m_date.strftime('%Y-%m-%d'), "name": m['n'], "importance": "CRITICAL", "type": "MACRO"})
                  except: continue

              with open('PROJECT/economic_events.json', 'w', encoding='utf-8') as f:
                  json.dump(auto_events, f, ensure_ascii=False, indent=4)
          except: pass

          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "원본 리스트 보존 및 자동화 일정 엔진 탑재 완벽본 🚀" || echo "No changes"
          git push