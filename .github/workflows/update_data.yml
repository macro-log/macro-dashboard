name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 🚨 무조건 3.10 이상 사용

      - name: Install dependencies
        run: |
          # 🚨 기존꺼 다 무시하고 최신 버전으로 강제 업데이트
          pip install --upgrade pip
          pip install -U google-generativeai yfinance pandas requests deep-translator

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import yfinance as yf
          import json
          import os
          import requests
          import re
          import datetime
          from email.utils import parsedate_to_datetime
          from xml.etree import ElementTree
          import google.generativeai as genai

          # 1. 환경 설정
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. 연준 데이터 (보존)
          fomc_data = [{"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52}, {"word": "RATE", "sentiment_score": 0.4, "status": "NEUTRAL", "display_score": "+0.4", "count": 48}, {"word": "POLICY", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 34}, {"word": "RISKS", "sentiment_score": -0.5, "status": "NEUTRAL", "display_score": "-0.5", "count": 21}, {"word": "GROWTH", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 20}, {"word": "LABOR", "sentiment_score": -0.0, "status": "NEUTRAL", "display_score": "-0.0", "count": 18}, {"word": "CREDIT", "sentiment_score": 0.2, "status": "NEUTRAL", "display_score": "+0.2", "count": 13}, {"word": "GDP", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 11}, {"word": "PRICES", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 11}, {"word": "EMPLOYMENT", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 7}, {"word": "ECONOMY", "sentiment_score": -0.7, "status": "NEUTRAL", "display_score": "-0.7", "count": 5}, {"word": "STABILITY", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 3}]

          # 3. 뉴스 수집
          def fetch_raw_headlines():
              urls = ["https://news.google.com/rss/search?q=Global+Market+Economy&hl=en-US&gl=US&ceid=US:en", "https://finance.yahoo.com/news/rssindex"]
              headlines = []
              now_utc = datetime.datetime.now(datetime.timezone.utc)
              for url in urls:
                  try:
                      res = requests.get(url, timeout=10)
                      tree = ElementTree.fromstring(res.content)
                      for it in tree.findall('.//item'):
                          pub_date = parsedate_to_datetime(it.find('pubDate').text)
                          if now_utc - pub_date < datetime.timedelta(hours=24):
                              headlines.append(it.find('title').text)
                  except: continue
              return list(set(headlines))

          all_headlines = fetch_raw_headlines()

          # 4. AI 분석 (이중 안전장치)
          dynamic_news = {}
          model_to_use = 'gemini-1.5-flash' # 🚨 1순위 타겟

          try:
              print(f"[{model_to_use}] 모델로 분석 시도 중...")
              model = genai.GenerativeModel(model_to_use)
              prompt = f"Analyze market news and give 6-sector report in Korean. JSON only: {chr(10).join(all_headlines[:30])}"
              response = model.generate_content(prompt)
              
              json_match = re.search(r'\{.*\}', response.text, re.DOTALL)
              if json_match:
                  dynamic_news = json.loads(json_match.group())
              else:
                  raise Exception("JSON 추출 실패")
                  
          except Exception as e:
              print(f"🚨 {model_to_use} 실패! 에러: {e}")
              print("💡 [gemini-pro] 모델로 긴급 우회합니다...")
              try:
                  # 🚨 1.5 Flash가 404 뜨면 가장 안정적인 구형 모델로 즉시 우회
                  model = genai.GenerativeModel('gemini-pro')
                  response = model.generate_content("현재 시장 상황에 대해 투자자들에게 줄 수 있는 조언 6가지를 테마별로 한국어로 작성해주고 JSON 형식으로 줘.")
                  json_match = re.search(r'\{.*\}', response.text, re.DOTALL)
                  if json_match:
                      dynamic_news = json.loads(json_match.group())
                  else:
                      raise Exception("우회 모델도 실패")
              except:
                  dynamic_news = {k: "데이터 분석 엔진 대기 중..." for k in ["시장 종합", "빅테크", "반도체", "금리/매크로", "에너지/원자재", "가상자산"]}

          # 5. 저장 (PROJECT 폴더)
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "last_updated": sync_time,
                  "master_score": 72,
                  "dynamic_news": dynamic_news,
                  "fomc_indicators": fomc_data,
                  "engine_indicators": fomc_data
              }, f, ensure_ascii=False, indent=4)

          # 6. 차트 데이터 (보존)
          try:
              chart_data = {}
              for name, tkr in {'BTC': 'BTC-USD', 'SPY': 'SPY', 'QQQ': 'QQQ'}.items():
                  df = yf.Ticker(tkr).history(period="1d", interval="5m")
                  chart_data[name] = {"day": {"labels": df.index.strftime('%H:%M').tolist(), "prices": df['Close'].tolist()}}
              with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
                  json.dump(chart_data, f, ensure_ascii=False)
          except: pass
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "404 에러 박멸 및 모델 우회 로직 장착 🚀" || echo "No changes"
          git push