name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U google-generativeai yfinance pandas requests deep-translator

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import yfinance as yf
          import json
          import os
          import requests
          import re
          import datetime
          import google.generativeai as genai
          from deep_translator import GoogleTranslator
          from xml.etree import ElementTree

          # 1. 환경 설정 및 시간 계산
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. [9대 지표 엔진] 실시간 스코어 계산 (불변)
          def calculate_master_score():
              try:
                  tickers = ['BTC-USD', 'SPY', 'QQQ', 'DIA', 'DX-Y.NYB', '^VIX', 'GC=F', 'HYG', 'XLY', 'XLP', '^TNX', '^TYX']
                  raw = {t: yf.Ticker(t).history(period="180d") for t in tickers}
                  def get_s(val, mid, span): return max(0, min(100, (val - (mid - span)) * (100 / (2 * span))))
                  s1 = get_s(35 - raw['^VIX']['Close'].iloc[-1], 20, 15) * 0.25
                  s2 = get_s(-((raw['GC=F']['Close'].iloc[-1]/raw['GC=F']['Close'].iloc[-2]-1)*100), 0, 2) * 0.15
                  s3 = get_s(raw['SPY']['Close'].iloc[-1]/raw['SPY']['Close'].rolling(120).mean().iloc[-1]*100, 100, 5) * 0.15
                  s4 = get_s(((raw['BTC-USD']['Close'].iloc[-1]/raw['BTC-USD']['Close'].iloc[-2]-1)*100), 0, 3) * 0.10
                  s5 = get_s(-((raw['DX-Y.NYB']['Close'].iloc[-1]/raw['DX-Y.NYB']['Close'].iloc[-2]-1)*100), 0, 1) * 0.10
                  cons = (raw['XLY']['Close'].iloc[-1]/raw['XLP']['Close'].iloc[-1]) / (raw['XLY']['Close'].iloc[-2]/raw['XLP']['Close'].iloc[-2]) - 1
                  s6 = get_s(cons*100, 0, 1) * 0.10
                  s7 = get_s(raw['HYG']['Close'].iloc[-1]/raw['HYG']['Close'].rolling(20).mean().iloc[-1]*100, 100, 2) * 0.075
                  def get_mfi(t):
                      df = raw[t]; curr = df['Close'].iloc[-1] * df['Volume'].iloc[-1]
                      avg = (df['Close'] * df['Volume']).rolling(20).mean().iloc[-1]
                      return curr / (avg + 1e-9)
                  s8 = get_s(get_mfi('QQQ') / get_mfi('DIA'), 1, 0.5) * 0.04
                  s9 = get_s(raw['^TYX']['Close'].iloc[-1] - raw['^TNX']['Close'].iloc[-1], 0.2, 0.5) * 0.035
                  return int(s1+s2+s3+s4+s5+s6+s7+s8+s9)
              except: return 50
          master_score = calculate_master_score()

          # 3. [보존] 연준 심리 데이터 (12개 키워드)
          fomc_data = [{"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52}, {"word": "RATE", "sentiment_score": 0.4, "status": "NEUTRAL", "display_score": "+0.4", "count": 48}, {"word": "POLICY", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 34}, {"word": "RISKS", "sentiment_score": -0.5, "status": "NEUTRAL", "display_score": "-0.5", "count": 21}, {"word": "GROWTH", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 20}, {"word": "LABOR", "sentiment_score": -0.0, "status": "NEUTRAL", "display_score": "-0.0", "count": 18}, {"word": "CREDIT", "sentiment_score": 0.2, "status": "NEUTRAL", "display_score": "+0.2", "count": 13}, {"word": "GDP", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 11}, {"word": "PRICES", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 11}, {"word": "EMPLOYMENT", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 7}, {"word": "ECONOMY", "sentiment_score": -0.7, "status": "NEUTRAL", "display_score": "-0.7", "count": 5}, {"word": "STABILITY", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 3}]

          # 4. 뉴스 수집 및 AI 브리핑 (해석 엔진 포함)
          def fetch_news():
              try:
                  res = requests.get("https://news.google.com/rss/search?q=Bloomberg+OR+WSJ+OR+Reuters+Market&hl=en-US&gl=US&ceid=US:en", timeout=15)
                  return [it.find('title').text for it in ElementTree.fromstring(res.content).findall('.//item')[:50]]
              except: return []

          all_headlines = fetch_news()
          dynamic_news, ai_briefing, period_interpretation = {}, "분석 중...", {}
          try:
              model = genai.GenerativeModel('models/gemini-2.0-flash')
              prompt = f"Analyze news into 6 sectors. Provide a 3-line briefing in 'briefing' and a 1-line analysis for [당일, 주간, 월간, 년간, 장기] in 'analysis'. JSON ONLY. News:\n{chr(10).join(all_headlines[:25])}"
              data = json.loads(re.search(r'\{.*\}', model.generate_content(prompt).text, re.DOTALL).group())
              ai_briefing, period_interpretation = data.get("briefing", ai_briefing), data.get("analysis", {})
              dynamic_news = {k: v for k, v in data.items() if k not in ["briefing", "analysis"]}
          except: pass

          # 5. indicators.json 저장
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({"last_updated": sync_time, "master_score": master_score, "market_temp": "-2.5", "ai_summary": ai_briefing, "period_interpretation": period_interpretation, "fomc_indicators": fomc_data, "dynamic_news": dynamic_news}, f, ensure_ascii=False, indent=4)

          # 6. 멀티 타임라인 차트 엔진 (누락 방지)
          try:
              chart_tickers = {'BTC': 'BTC-USD', 'SPY': 'SPY', 'QQQ': 'QQQ', 'DIA': 'DIA', 'US10Y': '^TNX', 'USDKRW': 'KRW=X'}
              chart_data = {}
              for name, tkr in chart_tickers.items():
                  try:
                      tk = yf.Ticker(tkr)
                      d_raw = tk.history(period="7d", interval="15m")
                      d_final = d_raw[d_raw.index.date == d_raw.index[-1].date()] if not d_raw.empty else None
                      w_raw = tk.history(period="1mo", interval="1h").tail(120)
                      m_raw = tk.history(period="6mo", interval="1d").tail(30)
                      y_raw = tk.history(period="2y", interval="1d").tail(260)
                      l_raw = tk.history(period="max", interval="1wk")
                      chart_data[name] = {
                          "day": {"labels": d_final.index.strftime('%H:%M').tolist() if d_final is not None else [], "prices": [round(p,2) for p in d_final['Close'].tolist()] if d_final is not None else []},
                          "week": {"labels": w_raw.index.strftime('%m-%d %H:00').tolist(), "prices": [round(p,2) for p in w_raw['Close'].tolist()]},
                          "month": {"labels": m_raw.index.strftime('%m-%d').tolist(), "prices": [round(p,2) for p in m_raw['Close'].tolist()]},
                          "year": {"labels": y_raw.index.strftime('%Y-%m').tolist(), "prices": [round(p,2) for p in y_raw['Close'].tolist()]},
                          "long": {"labels": l_raw.index.strftime('%Y').tolist(), "prices": [round(p,2) for p in l_raw['Close'].tolist()]}
                      }
                  except: continue
              with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
                  json.dump(chart_data, f, ensure_ascii=False)
          except: pass

          # 7. [완전 복구] 실적 이벤트 수집 로직
          try:
              today = datetime.date.today()
              events = []
              mag_7 = ['NVDA', 'TSLA', 'AAPL', 'MSFT', 'AMZN', 'GOOGL', 'META']
              for s in mag_7:
                  try:
                      cal = yf.Ticker(s).calendar
                      if cal is not None and 'Earnings Date' in cal:
                          e_date = cal['Earnings Date'][0]
                          if isinstance(e_date, datetime.datetime): e_date = e_date.date()
                          if e_date >= today:
                              events.append({"date": e_date.strftime('%Y-%m-%d'), "name": f"{s} 실적 발표", "importance": "HIGH", "type": "EARNINGS"})
                  except: continue
              events.append({"date": sync_time[:10], "name": "SIGNAL 9 시스템 동기화 완료", "importance": "NORMAL", "type": "SYSTEM"})
              with open('PROJECT/economic_events.json', 'w', encoding='utf-8') as f:
                  json.dump(events, f, ensure_ascii=False, indent=4)
          except: pass
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "실적 이벤트 복구 및 차트/AI 해석 최종 통합 완료 🚀" || echo "No changes"
          git push