name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U google-generativeai yfinance pandas requests deep-translator

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import yfinance as yf
          import json
          import os
          import requests
          import re
          import datetime
          import google.generativeai as genai
          from deep_translator import GoogleTranslator
          from xml.etree import ElementTree

          # 1. 환경 설정
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. 실시간 데이터 수집 (9대 지표 및 AI 분석용)
          tickers = ['BTC-USD', 'SPY', 'QQQ', 'DIA', 'DX-Y.NYB', '^VIX', 'GC=F', 'HYG', 'XLY', 'XLP', '^TNX', '^TYX']
          raw = {t: yf.Ticker(t).history(period="180d") for t in tickers}
          
          def get_chg(t): return round(((raw[t]['Close'].iloc[-1] / raw[t]['Close'].iloc[-2]) - 1) * 100, 2)
          current_vix = round(raw['^VIX']['Close'].iloc[-1], 2)
          spy_chg = get_chg('SPY')
          qqq_chg = get_chg('QQQ')
          btc_chg = get_chg('BTC-USD')

          # 3. 9대 지표 스코어 계산 (온도 -2.5 고정용)
          def calculate_master_score():
              try:
                  def get_s(val, mid, span): return max(0, min(100, (val - (mid - span)) * (100 / (2 * span))))
                  s1 = get_s(35 - current_vix, 20, 15) * 0.25
                  s2 = get_s(-(((raw['GC=F']['Close'].iloc[-1]/raw['GC=F']['Close'].iloc[-2])-1)*100), 0, 2) * 0.15
                  s3 = get_s(raw['SPY']['Close'].iloc[-1]/raw['SPY']['Close'].rolling(120).mean().iloc[-1]*100, 100, 5) * 0.15
                  s4 = get_s(btc_chg, 0, 3) * 0.10
                  s5 = get_s(-(((raw['DX-Y.NYB']['Close'].iloc[-1]/raw['DX-Y.NYB']['Close'].iloc[-2])-1)*100), 0, 1) * 0.10
                  cons = (raw['XLY']['Close'].iloc[-1]/raw['XLP']['Close'].iloc[-1]) / (raw['XLY']['Close'].iloc[-2]/raw['XLP']['Close'].iloc[-2]) - 1
                  s6 = get_s(cons*100, 0, 1) * 0.10
                  s7 = get_s(raw['HYG']['Close'].iloc[-1]/raw['HYG']['Close'].rolling(20).mean().iloc[-1]*100, 100, 2) * 0.075
                  def get_mfi(t): return (raw[t]['Close'].iloc[-1] * raw[t]['Volume'].iloc[-1]) / ((raw[t]['Close'] * raw[t]['Volume']).rolling(20).mean().iloc[-1] + 1e-9)
                  s8 = get_s(get_mfi('QQQ') / get_mfi('DIA'), 1, 0.5) * 0.04
                  s9 = get_s(raw['^TYX']['Close'].iloc[-1] - raw['^TNX']['Close'].iloc[-1], 0.2, 0.5) * 0.035
                  return int(s1+s2+s3+s4+s5+s6+s7+s8+s9)
              except: return 50
          
          master_score = calculate_master_score()

          # 4. 외신 뉴스 수집 및 통합 AI 브리핑
          def fetch_news():
              try:
                  # Bloomberg, WSJ, Reuters 포함 쿼리
                  url = "https://news.google.com/rss/search?q=Bloomberg+OR+WSJ+OR+Reuters+Global+Market+Economy&hl=en-US&gl=US&ceid=US:en"
                  res = requests.get(url, timeout=15)
                  return [it.find('title').text for it in ElementTree.fromstring(res.content).findall('.//item')[:50]]
              except: return []

          all_headlines = fetch_news()
          dynamic_news = {}
          ai_briefing = "데이터를 통합 분석 중입니다."
          
          try:
              model = genai.GenerativeModel('models/gemini-2.0-flash')
              # AI에게 시장 수치를 직접 제공하여 뇌를 깨워줌
              market_stats = f"VIX: {current_vix}, S&P500: {spy_chg}%, Nasdaq: {qqq_chg}%, BTC: {btc_chg}%"
              prompt = f"""
              당신은 투자 전문 AI 'SIGNAL 9'입니다.
              다음 시장 데이터와 외신 뉴스를 종합 분석하여 브리핑하세요.
              
              [현재 시장 데이터]
              {market_stats}
              
              [최신 외신 뉴스 제목]
              {chr(10).join(all_headlines[:20])}
              
              지시사항:
              1. 'briefing' 키에는 데이터(VIX, 등락률)와 뉴스를 연결한 날카로운 'AI 시장 3줄 요약'을 한국어로 작성하세요.
              2. 나머지 뉴스는 6개 섹터별로 분류하여 'title'과 'summary'를 작성하세요.
              3. 반드시 JSON 형식으로만 응답하세요.
              """
              response = model.generate_content(prompt)
              json_match = re.search(r'\{.*\}', response.text, re.DOTALL)
              if json_match:
                  dynamic_news = json.loads(json_match.group())
                  ai_briefing = dynamic_news.get("briefing", ai_briefing)
          except Exception as e:
              print(f"AI 분석 실패: {e}")

          # 5. indicators.json 저장
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "last_updated": sync_time,
                  "master_score": master_score,
                  "market_temp": "-2.5",
                  "ai_summary": ai_briefing,
                  "dynamic_news": dynamic_news,
                  "fomc_indicators": [{"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52}]
              }, f, ensure_ascii=False, indent=4)

          # 6. 차트 데이터 수집 (5일/10년 듀얼 궤적 로직)
          try:
              chart_tickers = {'BTC': 'BTC-USD', 'SPY': 'SPY', 'QQQ': 'QQQ', 'DIA': 'DIA', 'US10Y': '^TNX', 'USDKRW': 'KRW=X', 'GOLD': 'GC=F'}
              chart_data = {}
              for name, tkr in chart_tickers.items():
                  try:
                      tk = yf.Ticker(tkr)
                      df_day = tk.history(period="5d", interval="15m")
                      if not df_day.empty:
                          last_day = df_day[df_day.index.date == df_day.index[-1].date()]
                          day_labels, day_prices = last_day.index.strftime('%H:%M').tolist(), [round(p, 2) for p in last_day['Close'].tolist()]
                      else: day_labels, day_prices = [], []
                      
                      df_full = tk.history(period="10y", interval="1d")
                      full_labels, full_prices = df_full.index.strftime('%Y-%m-%d').tolist(), [round(p, 2) for p in df_full['Close'].tolist()]
                      
                      chart_data[name] = {"day": {"labels": day_labels, "prices": day_prices}, "full": {"labels": full_labels, "prices": full_prices}}
                  except: continue
              with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
                  json.dump(chart_data, f, ensure_ascii=False)
          except: pass
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "외신+데이터 통합 AI 브리핑 및 차트 최적화 완료 🚀" || echo "No changes"
          git push