name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'  # 5분은 너무 잦아서 차단 위험이 있으니 1시간(정각)을 권장합니다.
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run Update Script
        run: |
          python << END
          import yfinance as yf
          import json
          import os

          # 1. 기존 데이터 불러오기 (보존용)
          file_path = 'indicators.json'
          data = {"market_temp": 0, "master_score": 50, "ai_summary": "", "indicators": []}
          if os.path.exists(file_path):
              with open(file_path, 'r', encoding='utf-8') as f:
                  try: data = json.load(f)
                  except: pass

          # 2. 마스터 게이지 점수 계산 (VIX + 모멘텀)
          try:
              vix = yf.Ticker("^VIX").history(period="1d")['Close'].iloc[-1]
              vix_score = max(0, min(100, 100 - ((vix - 10) * (100 / 30))))
              spy = yf.Ticker("SPY").history(period="150d")
              ratio = (spy['Close'].iloc[-1] / spy['Close'].rolling(window=125).mean().iloc[-1]) * 100
              momentum_score = max(0, min(100, (ratio - 90) * 5))
              data['master_score'] = int((vix_score * 0.5) + (momentum_score * 0.5))
          except:
              data['master_score'] = data.get('master_score', 50)

          # 3. 개별 지표 가격 수집 (형님의 기존 기능 유지)
          tickers = {
              "BTC": "BTC-USD", "SPY": "^GSPC", "QQQ": "^IXIC", "DIA": "^DJI",
              "USDKRW": "KRW=X", "US10Y": "^TNX", "GOLD": "GC=F", "OIL": "CL=F"
          }
          
          price_results = []
          for name, ticker in tickers.items():
              try:
                  t = yf.Ticker(ticker)
                  hist = t.history(period="2d")
                  curr = hist['Close'].iloc[-1]
                  prev = hist['Close'].iloc[0]
                  change = ((curr - prev) / prev) * 100
                  price_results.append({
                      "symbol": name,
                      "price": f"{curr:,.2f}",
                      "change": f"{change:+.2f}%"
                  })
              except: pass
          
          # 4. 데이터 합치기 (기존 필드는 유지하고 마스터 점수와 가격 리스트만 업데이트)
          data['live_prices'] = price_results
          
          # 5. 저장 (경로는 root의 indicators.json으로 통일)
          with open(file_path, 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=4, ensure_ascii=False)
          END

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add indicators.json
          git commit -m "지표 및 마스터 점수 업데이트 [skip ci]" || echo "No changes"
          git push