name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance pandas google-generativeai requests deep-translator

      - name: Run Update Script (Indicators & AI)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import yfinance as yf
          import json
          import os
          import requests
          import re
          from xml.etree import ElementTree
          from deep_translator import GoogleTranslator
          import google.generativeai as genai

          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          translator = GoogleTranslator(source='auto', target='ko')

          def get_score(val, low, high, reverse=False):
              score = ((val - low) / (high - low)) * 100
              return max(0, min(100, 100 - score if reverse else score))

          # 1. 7대 엔진 점수 반영
          try:
              tickers = {"VIX": "^VIX", "SPY": "SPY", "HYG": "HYG", "IEF": "IEF", "UUP": "UUP", "QQQ": "QQQ", "DIA": "DIA", "GOLD": "GC=F", "BTC": "BTC-USD"}
              raw_data = {k: yf.Ticker(v).history(period="150d") for k, v in tickers.items()}

              s1 = get_score(raw_data["VIX"]['Close'].iloc[-1], 12, 35, reverse=True)
              s2 = get_score(raw_data["SPY"]['Close'].iloc[-1] / raw_data["SPY"]['Close'].rolling(window=125).mean().iloc[-1], 0.9, 1.1)
              s3 = get_score(raw_data["HYG"]['Close'].iloc[-1] / raw_data["IEF"]['Close'].iloc[-1], 0.7, 0.9)
              s4 = get_score(raw_data["UUP"]['Close'].iloc[-1] / raw_data["UUP"]['Close'].rolling(window=125).mean().iloc[-1], 0.95, 1.1, reverse=True)
              s5 = get_score(raw_data["QQQ"]['Close'].iloc[-1] / raw_data["DIA"]['Close'].iloc[-1], 1.0, 1.3)
              s6 = get_score(raw_data["GOLD"]['Close'].iloc[-1] / raw_data["GOLD"]['Close'].rolling(window=125).mean().iloc[-1], 0.95, 1.15, reverse=True)
              s7 = get_score(raw_data["BTC"]['Close'].iloc[-1] / raw_data["BTC"]['Close'].rolling(window=20).mean().iloc[-1], 0.8, 1.2)
              
              final_score = int((s1*0.20) + (s2*0.20) + (s3*0.20) + (s4*0.15) + (s5*0.15) + (s6*0.05) + (s7*0.05))

              engine_data = [
                  {"word": "시장 공포(VIX)", "display_score": f"{int(s1)}점", "count": "Market", "sentiment_score": round((s1-50)/5, 1)},
                  {"word": "가격 추세(SPY)", "display_score": f"{int(s2)}점", "count": "Price", "sentiment_score": round((s2-50)/5, 1)},
                  {"word": "기업 신용(HYG)", "display_score": f"{int(s3)}점", "count": "Credit", "sentiment_score": round((s3-50)/5, 1)},
                  {"word": "달러 강세(UUP)", "display_score": f"{int(s4)}점", "count": "Cash", "sentiment_score": round((s4-50)/5, 1)},
                  {"word": "기술주 선호(QQQ)", "display_score": f"{int(s5)}점", "count": "Tech", "sentiment_score": round((s5-50)/5, 1)},
                  {"word": "안전자산(GOLD)", "display_score": f"{int(s6)}점", "count": "Safe", "sentiment_score": round((s6-50)/5, 1)},
                  {"word": "코인 열기(BTC)", "display_score": f"{int(s7)}점", "count": "Crypto", "sentiment_score": round((s7-50)/5, 1)}
              ]
          except Exception as e:
              final_score, engine_data = 50, []

          # 2. 연준 심리 데이터 (FOMC)
          fomc_data = [{"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52}, {"word": "RATE", "sentiment_score": 0.4, "status": "NEUTRAL", "display_score": "+0.4", "count": 48}, {"word": "POLICY", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 34}, {"word": "RISKS", "sentiment_score": -0.5, "status": "NEUTRAL", "display_score": "-0.5", "count": 21}, {"word": "GROWTH", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 20}, {"word": "LABOR", "sentiment_score": -0.0, "status": "NEUTRAL", "display_score": "-0.0", "count": 18}, {"word": "CREDIT", "sentiment_score": 0.2, "status": "NEUTRAL", "display_score": "+0.2", "count": 13}, {"word": "GDP", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 11}, {"word": "PRICES", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 11}, {"word": "EMPLOYMENT", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 7}, {"word": "ECONOMY", "sentiment_score": -0.7, "status": "NEUTRAL", "display_score": "-0.7", "count": 5}, {"word": "STABILITY", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 3}]

          # 3. 섹터 뉴스 수집 및 번역
          sectors = {"BIG TECH": "https://news.google.com/rss/search?q=Apple+Nvidia+Microsoft+Stock&hl=en-US&gl=US&ceid=US:en", "SEMICON": "https://news.google.com/rss/search?q=Semiconductor+TSMC+ASML&hl=en-US&gl=US&ceid=US:en", "FINANCE": "https://news.google.com/rss/search?q=JPMorgan+Goldman+Sachs+FED&hl=en-US&gl=US&ceid=US:en"}
          sector_news_data = {}
          for name, url in sectors.items():
              try:
                  response = requests.get(url, timeout=10)
                  tree = ElementTree.fromstring(response.content)
                  items = []
                  for item in tree.findall('.//item')[:3]:
                      ko_title = translator.translate(item.find('title').text)
                      en_desc_raw = item.find('description').text if item.find('description') is not None else ""
                      en_desc = re.sub('<[^<]+>', '', en_desc_raw)
                      ko_desc = translator.translate(en_desc[:120]) + "..." if en_desc else ""
                      display_text = f"{ko_title}<br><span style='font-size:11px; color:#94a3b8; font-weight:normal; display:block; margin-top:4px;'>{ko_desc}</span>"
                      items.append({"title": display_text, "link": item.find('link').text, "date": item.find('pubDate').text[:16]})
                  sector_news_data[name] = items
              except: sector_news_data[name] = []

          # 4. AI 브리핑
          ai_summary = "데이터 분석 완료."
          try:
              top_titles = [n['title'] for n in sector_news_data.get("BIG TECH", [])[:2] + sector_news_data.get("FINANCE", [])[:2]]
              news_text = "\n".join([re.sub('<[^<]+>', '', t) for t in top_titles])
              prompt = f"현재 시장 점수 {final_score}/100점. 핵심 뉴스:\n{news_text}\n시장 상황을 한국어로 3줄 요약해줘. 형님께 보고하듯 씩씩하고 위트 있게!"
              response = genai.GenerativeModel('gemini-1.5-flash').generate_content(prompt)
              ai_summary = response.text
          except: pass

          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({"master_score": final_score, "market_temp": "-2.5", "ai_summary": ai_summary, "fomc_indicators": fomc_data, "engine_indicators": engine_data, "sector_news": sector_news_data}, f, ensure_ascii=False, indent=4)
          EOF

      - name: Run Earnings Script (Big Tech)
        run: |
          python << 'EOF'
          import os
          import json
          import pandas as pd
          import yfinance as yf

          print("=== 빅테크 실적발표 자동 업데이트 시작 ===")
          events_file = 'PROJECT/economic_events.json'

          if os.path.exists(events_file):
              with open(events_file, 'r', encoding='utf-8') as f:
                  try: events_data = json.load(f)
                  except: events_data = []
          else: events_data = []

          manual_events = [e for e in events_data if e.get('type') != 'EARNINGS']
          auto_earnings = []
          tickers = ['AAPL', 'MSFT', 'NVDA', 'TSLA', 'AMZN', 'GOOGL', 'META']
          now_utc = pd.Timestamp.now('UTC')

          for ticker in tickers:
              try:
                  tk = yf.Ticker(ticker)
                  earning_dates = tk.get_earnings_dates(limit=10)
                  if earning_dates is not None and not earning_dates.empty:
                      future_dates = earning_dates[earning_dates.index >= now_utc]
                      if not future_dates.empty:
                          date_str = future_dates.index.min().strftime('%Y-%m-%d')
                          auto_earnings.append({"date": date_str, "name": f"{ticker} 실적발표", "importance": "HIGH", "type": "EARNINGS"})
                          print(f"[성공] {ticker} 실적발표일: {date_str}")
              except Exception as e: print(f"[실패] {ticker} 에러: {e}")

          final_events = manual_events + auto_earnings
          final_events.sort(key=lambda x: x['date'])
          with open(events_file, 'w', encoding='utf-8') as f:
              json.dump(final_events, f, ensure_ascii=False, indent=4)
          print("=== 빅테크 실적발표 자동 업데이트 완료 ===")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "7대엔진 정상화 및 실적발표 자동화 완료 🚀" || echo "No changes"
          git push