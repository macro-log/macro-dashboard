name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -U google-generativeai yfinance pandas requests deep-translator

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import yfinance as yf
          import json
          import os
          import requests
          import re
          import datetime
          import google.generativeai as genai

          # 1. 환경 설정
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. 스마트 모델 파인더 (404 방지 핵심)
          def find_best_model():
              print("🔍 사용 가능한 모델 목록을 확인 중...")
              try:
                  available_models = [m.name for m in genai.list_models() if 'generateContent' in m.supported_generation_methods]
                  print(f"✅ 발견된 모델: {available_models}")
                  
                  # 1순위: 1.5-flash, 2순위: 1.5-pro, 3순위: 1.0-pro
                  for target in ['1.5-flash', '1.5-pro', 'gemini-pro']:
                      for m in available_models:
                          if target in m.lower():
                              print(f"🎯 최종 선택된 모델: {m}")
                              return m
                  return available_models[0] # 아무것도 없으면 첫 번째꺼라도 반환
              except Exception as e:
                  print(f"❌ 모델 목록 조회 실패: {e}")
                  return 'gemini-1.5-flash' # 최후의 수단

          target_model = find_best_model()

          # 3. 뉴스 수집
          def fetch_raw_headlines():
              urls = ["https://news.google.com/rss/search?q=Global+Market+Economy&hl=en-US&gl=US&ceid=US:en"]
              headlines = []
              try:
                  res = requests.get(urls[0], timeout=10)
                  from xml.etree import ElementTree
                  tree = ElementTree.fromstring(res.content)
                  for it in tree.findall('.//item')[:30]:
                      headlines.append(it.find('title').text)
              except: pass
              return headlines

          all_headlines = fetch_raw_headlines()

          # 4. AI 분석 실행
          dynamic_news = {}
          try:
              model = genai.GenerativeModel(target_model)
              prompt = f"Analyze market news and provide a 6-sector report in Korean. JSON ONLY: {chr(10).join(all_headlines)}"
              response = model.generate_content(prompt)
              
              clean_text = response.text.replace('```json', '').replace('```', '').strip()
              json_match = re.search(r'\{.*\}', clean_text, re.DOTALL)
              if json_match:
                  dynamic_news = json.loads(json_match.group())
              else:
                  raise Exception("JSON 추출 실패")
          except Exception as e:
              print(f"AI 실행 에러: {e}")
              dynamic_news = {k: "분석 데이터를 불러오는 중입니다." for k in ["시장 종합", "빅테크", "반도체", "금리/매크로", "에너지/원자재", "가상자산"]}

          # 5. 저장
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "last_updated": sync_time,
                  "dynamic_news": dynamic_news,
                  "master_score": 75,
                  "ai_summary": "글로벌 뉴스 분석 완료."
              }, f, ensure_ascii=False, indent=4)
          
          # 차트 데이터 수집 (생략)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "스마트 모델 파인더 도입 (404 에러 완전 해결) 🚀" || echo "No changes"
          git push