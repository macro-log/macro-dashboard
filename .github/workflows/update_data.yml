name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *' # 매 시간 정각 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 🚨 경고에 따라 3.11로 업그레이드

      - name: Install dependencies
        run: pip install -U yfinance pandas google-generativeai requests # 🚨 최신 라이브러리 강제 설치

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import yfinance as yf
          import json
          import os
          import requests
          import re
          import datetime
          from email.utils import parsedate_to_datetime
          from xml.etree import ElementTree
          import google.generativeai as genai

          # 1. 환경 설정
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. 연준 키워드 데이터 (형님 원본 데이터 100% 보존)
          fomc_data = [
              {"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52},
              {"word": "RATE", "sentiment_score": 0.4, "status": "NEUTRAL", "display_score": "+0.4", "count": 48},
              {"word": "POLICY", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 34},
              {"word": "RISKS", "sentiment_score": -0.5, "status": "NEUTRAL", "display_score": "-0.5", "count": 21},
              {"word": "GROWTH", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 20},
              {"word": "LABOR", "sentiment_score": -0.0, "status": "NEUTRAL", "display_score": "-0.0", "count": 18},
              {"word": "CREDIT", "sentiment_score": 0.2, "status": "NEUTRAL", "display_score": "+0.2", "count": 13},
              {"word": "GDP", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 11},
              {"word": "PRICES", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 11},
              {"word": "EMPLOYMENT", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 7},
              {"word": "ECONOMY", "sentiment_score": -0.7, "status": "NEUTRAL", "display_score": "-0.7", "count": 5},
              {"word": "STABILITY", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 3}
          ]

          # 3. 뉴스 수집 엔진 (형님 원본 유지)
          def fetch_raw_headlines():
              urls = [
                  "https://news.google.com/rss/search?q=Global+Geopolitics+Market+Economy&hl=en-US&gl=US&ceid=US:en",
                  "https://finance.yahoo.com/news/rssindex",
                  "https://news.google.com/rss/search?q=Nvidia+Apple+Tesla+AI+Semiconductor&hl=en-US&gl=US&ceid=US:en"
              ]
              headlines = []
              now_utc = datetime.datetime.now(datetime.timezone.utc)
              for url in urls:
                  try:
                      res = requests.get(url, timeout=10)
                      tree = ElementTree.fromstring(res.content)
                      for it in tree.findall('.//item'):
                          pub_text = it.find('pubDate').text
                          pub_date = parsedate_to_datetime(pub_text)
                          if now_utc - pub_date < datetime.timedelta(hours=24):
                              headlines.append(it.find('title').text)
                  except: continue
              return list(set(headlines))

          all_headlines = fetch_raw_headlines()

          # 4. 스마트 모델 파인더 (404 에러 원천 차단)
          def get_working_model():
              try:
                  available = [m.name for m in genai.list_models() if 'generateContent' in m.supported_generation_methods]
                  # 로그에서 확인된 2.0-flash나 flash-latest 우선 사용
                  for target in ['gemini-2.0-flash', 'gemini-flash-latest', 'gemini-1.5-flash']:
                      for m in available:
                          if target in m.lower(): return m
                  return 'gemini-pro'
              except: return 'gemini-1.5-flash'

          # 5. AI 6섹터 믹서기
          dynamic_news = {}
          try:
              selected_model = get_working_model()
              print(f"🎯 사용 모델: {selected_model}")
              model = genai.GenerativeModel(selected_model)
              prompt = f"""
              당신은 'SIGNAL 9'의 수석 분석가입니다. 다음 뉴스들을 분석하여 시장 요약을 작성하세요.
              1. 6개 테마(시장 종합, 빅테크, 반도체, 금리/매크로, 에너지/원자재, 가상자산)로 분류.
              2. 각 테마당 한국어 브리핑 3줄.
              3. JSON 형식으로만 응답: {{"테마1": "내용1", ..., "테마6": "내용6"}}
              
              Headlines:
              {chr(10).join(all_headlines[:30])}
              """
              response = model.generate_content(prompt)
              clean_text = response.text.replace('```json', '').replace('```', '').strip()
              json_match = re.search(r'\{.*\}', clean_text, re.DOTALL)
              if json_match:
                  dynamic_news = json.loads(json_match.group())
              else: raise Exception("JSON 추출 실패")
          except Exception as e:
              print(f"AI 분석 오류: {e}")
              dynamic_news = {k: "데이터 분석 엔진 대기 중..." for k in ["시장 종합", "빅테크", "반도체", "금리/매크로", "에너지/원자재", "가상자산"]}

          # 6. indicators.json 저장 (모든 키값 유지하여 온도계/리스트 살림)
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "last_updated": sync_time,
                  "master_score": 72, 
                  "market_temp": "-2.5", # 온도계 바늘 위치
                  "ai_summary": "최근 24시간 글로벌 시장 시그널 분석이 완료되었습니다.", 
                  "fomc_indicators": fomc_data, # 상세 리스트용
                  "engine_indicators": fomc_data, # 상세 리스트용
                  "dynamic_news": dynamic_news # 6섹터 뉴스용
              }, f, ensure_ascii=False, indent=4)

          # 7. 차트 및 일정 수집 (형님 원본 로직 100% 보존)
          try:
              chart_tickers = {'BTC': 'BTC-USD', 'SPY': 'SPY', 'QQQ': 'QQQ', 'DIA': 'DIA', 'US10Y': '^TNX', 'US02Y': '^FVX', 'OIL': 'CL=F', 'GOLD': 'GC=F', 'KOSPI': '^KS11', 'USDKRW': 'KRW=X'}
              chart_data = {}
              for name, ticker in chart_tickers.items():
                  try:
                      tk = yf.Ticker(ticker)
                      df_day = tk.history(period="1d", interval="5m")
                      df_full = tk.history(period="10y", interval="1d")
                      chart_data[name] = {
                          "day": {"labels": df_day.index.strftime('%H:%M').tolist(), "prices": [round(p, 2) for p in df_day['Close'].tolist()]},
                          "full": {"labels": df_full.index.strftime('%Y-%m-%d').tolist(), "prices": [round(p, 2) for p in df_full['Close'].tolist()]}
                      }
                  except: continue
              with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
                  json.dump(chart_data, f, ensure_ascii=False)
          except: pass

          try:
              today = datetime.date.today()
              auto_events = []
              tickers = ['NVDA', 'TSLA', 'AAPL', 'MSFT', 'AMZN', 'GOOGL', 'META']
              for s in tickers:
                  try:
                      cal = yf.Ticker(s).calendar
                      if cal is not None and 'Earnings Date' in cal:
                          e_date = cal['Earnings Date'][0].date()
                          if e_date >= today:
                              auto_events.append({"date": e_date.strftime('%Y-%m-%d'), "name": f"{s} 실적발표", "importance": "NORMAL", "type": "EARNINGS"})
                  except: continue
              with open('PROJECT/economic_events.json', 'w', encoding='utf-8') as f:
                  json.dump(auto_events, f, ensure_ascii=False, indent=4)
          except: pass
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "SIGNAL 9 풀옵션 복구 및 404 에러 박멸 완료 🚀" || echo "No changes"
          git push