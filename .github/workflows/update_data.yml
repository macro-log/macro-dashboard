name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U google-generativeai yfinance pandas requests

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import warnings
          warnings.filterwarnings("ignore", category=FutureWarning)
          import yfinance as yf
          import json, os, requests, re, datetime, urllib.request
          import google.generativeai as genai
          from xml.etree import ElementTree

          # 1. 환경 설정 및 시간 계산
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. 실시간 마켓 데이터 수집
          tickers_list = ['BTC-USD', 'SPY', 'QQQ', 'DIA', 'DX-Y.NYB', '^VIX', 'GC=F', 'HYG', 'XLY', 'XLP', '^TNX', '^TYX']
          raw = {t: yf.Ticker(t).history(period="180d") for t in tickers_list}
          
          def get_chg(t): return round(((raw[t]['Close'].iloc[-1] / raw[t]['Close'].iloc[-2]) - 1) * 100, 2)
          current_vix = round(raw['^VIX']['Close'].iloc[-1], 2)
          market_stats = f"VIX: {current_vix}, S&P500: {get_chg('SPY')}%, Nasdaq: {get_chg('QQQ')}%, BTC: {get_chg('BTC-USD')}%"

          # [엔진] 9대 지표 실시간 스코어 계산
          def calculate_master_score():
              try:
                  def get_s(val, mid, span): return max(0, min(100, (val - (mid - span)) * (100 / (2 * span))))
                  s1 = get_s(35 - current_vix, 20, 15) * 0.25
                  s2 = get_s(-((raw['GC=F']['Close'].iloc[-1]/raw['GC=F']['Close'].iloc[-2]-1)*100), 0, 2) * 0.15
                  s3 = get_s(raw['SPY']['Close'].iloc[-1]/raw['SPY']['Close'].rolling(120).mean().iloc[-1]*100, 100, 5) * 0.15
                  s4 = get_s(get_chg('BTC-USD'), 0, 3) * 0.10
                  s5 = get_s(-get_chg('DX-Y.NYB'), 0, 1) * 0.10
                  cons = (raw['XLY']['Close'].iloc[-1]/raw['XLP']['Close'].iloc[-1]) / (raw['XLY']['Close'].iloc[-2]/raw['XLP']['Close'].iloc[-2]) - 1
                  s6 = get_s(cons*100, 0, 1) * 0.10
                  s7 = get_s(raw['HYG']['Close'].iloc[-1]/raw['HYG']['Close'].rolling(20).mean().iloc[-1]*100, 100, 2) * 0.075
                  def get_mfi(t): return (raw[t]['Close'].iloc[-1] * raw[t]['Volume'].iloc[-1]) / ((raw[t]['Close'] * raw[t]['Volume']).rolling(20).mean().iloc[-1] + 1e-9)
                  s8 = get_s(get_mfi('QQQ') / get_mfi('DIA'), 1, 0.5) * 0.04
                  s9 = get_s(raw['^TYX']['Close'].iloc[-1] - raw['^TNX']['Close'].iloc[-1], 0.2, 0.5) * 0.035
                  return int(s1+s2+s3+s4+s5+s6+s7+s8+s9)
              except: return 50
          master_score = calculate_master_score()

          # 3. 연준 심리 데이터 (보존)
          fomc_data = [{"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52}, {"word": "RATE", "sentiment_score": 0.4, "status": "NEUTRAL", "display_score": "+0.4", "count": 48}, {"word": "POLICY", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 34}, {"word": "RISKS", "sentiment_score": -0.5, "status": "NEUTRAL", "display_score": "-0.5", "count": 21}, {"word": "GROWTH", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 20}, {"word": "LABOR", "sentiment_score": -0.0, "status": "NEUTRAL", "display_score": "-0.0", "count": 18}, {"word": "CREDIT", "sentiment_score": 0.2, "status": "NEUTRAL", "display_score": "+0.2", "count": 13}, {"word": "GDP", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 11}, {"word": "PRICES", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 11}, {"word": "EMPLOYMENT", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 7}, {"word": "ECONOMY", "sentiment_score": -0.7, "status": "NEUTRAL", "display_score": "-0.7", "count": 5}, {"word": "STABILITY", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 3}]

          # 4. [프리미엄] 월스트리트저널(WSJ), 블룸버그, 로이터 전용 뉴스 수집
          def fetch_premium_news():
              headlines = []
              # WSJ 공식 마켓 피드 + 구글뉴스(블룸버그/로이터 필터링)
              urls = [
                  "https://feeds.a.dj.com/rss/RSSMarketsMain.xml",
                  "https://news.google.com/rss/search?q=when:1d+AND+(source:Bloomberg+OR+source:Reuters)+market+finance&hl=en-US&gl=US&ceid=US:en"
              ]
              headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'}
              for url in urls:
                  try:
                      req = urllib.request.Request(url, headers=headers)
                      res = urllib.request.urlopen(req, timeout=10)
                      root = ElementTree.fromstring(res.read())
                      for item in root.findall('.//item')[:15]:
                          headlines.append(item.find('title').text)
                  except Exception as e:
                      print(f"RSS 에러 ({url}): {e}")
              return list(set(headlines))

          all_headlines = fetch_premium_news()

          # 5. [의역 특화] 제미나이 AI 분석 (안전필터 해제 및 번역체 제거)
          dynamic_news = {}
          ai_briefing = "AI가 글로벌 마켓 데이터를 동기화하고 있습니다."
          period_interpretation = {"당일": "안정적 흐름", "주간": "매크로 대기", "월간": "추세 형성 중", "년간": "사이클 반영", "장기": "역사적 위치 파악 중"}
          
          try:
              model = genai.GenerativeModel('gemini-2.0-flash')
              prompt = f"""
              당신은 월스트리트 최고 수준의 거시경제 애널리스트이자, 한국경제신문의 수석 편집장입니다.
              다음 데이터를 분석하여 JSON 형식으로만 응답하세요.

              [시장 데이터]: {market_stats}
              [WSJ, 블룸버그, 로이터 뉴스]: {chr(10).join(all_headlines[:30])}

              [🚨번역 및 작성 철칙🚨]
              1. 기계적인 '번역체'나 '직역'을 절대 피하세요.
              2. 한국 여의도 증권가 리포트나 국내 1군 경제지(매일경제 등)의 실제 헤드라인처럼 아주 자연스럽고 세련되게 "의역"하세요.
              (잘못된 예: 미국 주식이 인플레이션 두려움에 떨어지다 -> 올바른 예: 미 증시, 인플레 공포 재점화에 하락 마감)
              3. 불필요한 서술어를 빼고 핵심만 날카롭게 요약하세요.

              응답 JSON 구조:
              {{
                  "briefing": "시장 상황을 관통하는 날카로운 3줄 요약 (자연스러운 한국어)",
                  "analysis": {{
                      "당일": "오늘 시장의 핵심 변동 원인",
                      "주간": "이번 주 주요 모멘텀",
                      "월간": "월간 시장 흐름 해석",
                      "년간": "올해 경제 사이클 전망",
                      "장기": "장기적 투자 패러다임 뷰"
                  }},
                  "거시경제": [ {{"title": "여의도 스타일의 세련된 한국어 제목", "summary": "핵심 1줄 요약"}} ],
                  "주식시장": [ {{"title": "여의도 스타일의 세련된 한국어 제목", "summary": "핵심 1줄 요약"}} ],
                  "암호화폐": [ {{"title": "여의도 스타일의 세련된 한국어 제목", "summary": "핵심 1줄 요약"}} ],
                  "원자재": [ {{"title": "여의도 스타일의 세련된 한국어 제목", "summary": "핵심 1줄 요약"}} ],
                  "빅테크": [ {{"title": "여의도 스타일의 세련된 한국어 제목", "summary": "핵심 1줄 요약"}} ],
                  "지정학": [ {{"title": "여의도 스타일의 세련된 한국어 제목", "summary": "핵심 1줄 요약"}} ]
              }}
              """
              
              # 폭락, 유혈사태 등 자극적인 금융 용어 때문에 AI가 멈추지 않도록 안전 필터 전면 해제
              safety_settings = {
                  'HARM_CATEGORY_HATE_SPEECH': 'BLOCK_NONE',
                  'HARM_CATEGORY_HARASSMENT': 'BLOCK_NONE',
                  'HARM_CATEGORY_SEXUALLY_EXPLICIT': 'BLOCK_NONE',
                  'HARM_CATEGORY_DANGEROUS_CONTENT': 'BLOCK_NONE'
              }

              response = model.generate_content(
                  prompt, 
                  generation_config={"response_mime_type": "application/json"},
                  safety_settings=safety_settings
              )
              
              data = json.loads(response.text)
              ai_briefing = data.get("briefing", ai_briefing)
              period_interpretation = data.get("analysis", period_interpretation)
              
              for key in ["거시경제", "주식시장", "암호화폐", "원자재", "빅테크", "지정학"]:
                  if key in data and data[key]:
                      dynamic_news[key] = data[key]
              print("✅ 프리미엄 뉴스 분석 & 세련된 번역 완료!")
          except Exception as e:
              print(f"⚠️ AI 분석 에러 (안전필터/JSON 파싱): {e}")

          # 6. indicators.json 저장
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "last_updated": sync_time, "master_score": master_score, "market_temp": "-2.5",
                  "ai_summary": ai_briefing, "period_interpretation": period_interpretation,
                  "fomc_indicators": fomc_data, "engine_indicators": fomc_data, "dynamic_news": dynamic_news
              }, f, ensure_ascii=False, indent=4)

          # 7. 차트 엔진 (★유가, 금, 코스피, 2년물 추가! 다른 로직은 그대로 유지★)
          try:
              chart_tickers = {
                  'BTC': 'BTC-USD', 'SPY': 'SPY', 'QQQ': 'QQQ', 'DIA': 'DIA', 
                  'US10Y': '^TNX', 'US02Y': '^FVX', 'OIL': 'CL=F', 'GOLD': 'GC=F', 
                  'KOSPI': '^KS11', 'USDKRW': 'KRW=X'
              }
              chart_data = {}
              for name, tkr in chart_tickers.items():
                  try:
                      tk = yf.Ticker(tkr)
                      def sync_data(df, label_fmt):
                          if df.empty: return {"labels": [], "prices": []}
                          labels = df.index.strftime(label_fmt).tolist()
                          prices = [round(float(p), 2) for p in df['Close'].tolist()]
                          min_len = min(len(labels), len(prices))
                          return {"labels": labels[:min_len], "prices": prices[:min_len]}

                      d_raw = tk.history(period="7d", interval="15m")
                      day_data = sync_data(d_raw[d_raw.index.date == d_raw.index[-1].date()], '%H:%M') if not d_raw.empty else {"labels": [], "prices": []}
                      week_data = sync_data(tk.history(period="1mo", interval="1h").tail(168), '%m-%d %H:00')
                      month_data = sync_data(tk.history(period="6mo", interval="1d").tail(30), '%m-%d')
                      year_data = sync_data(tk.history(period="2y", interval="1d").tail(365), '%Y-%m')
                      long_data = sync_data(tk.history(period="max", interval="1wk"), '%Y')

                      chart_data[name] = {"labels": day_data["labels"], "prices": day_data["prices"], "day": day_data, "week": week_data, "month": month_data, "year": year_data, "long": long_data}
                  except: continue
              with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
                  json.dump(chart_data, f, ensure_ascii=False)
          except: pass

          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "누락된 4종 차트 데이터 완벽 복원 🚀" || echo "No changes"
          git push