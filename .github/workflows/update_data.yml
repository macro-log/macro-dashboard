name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run Update Script
        run: |
          python << END
          import yfinance as yf
          import json
          import os

          file_path = 'indicators.json'
          # 1. 기존 데이터 읽기 (보존용)
          if os.path.exists(file_path):
              with open(file_path, 'r', encoding='utf-8') as f:
                  data = json.load(f)
          else:
              data = {"market_temp": 0, "indicators": [], "sector_news": {}}

          # 2. 마스터 점수 계산 (VIX + 모멘텀)
          try:
              vix = yf.Ticker("^VIX").history(period="1d")['Close'].iloc[-1]
              vix_score = max(0, min(100, 100 - ((vix - 10) * (100 / 30))))
              spy = yf.Ticker("SPY").history(period="150d")
              ratio = (spy['Close'].iloc[-1] / spy['Close'].rolling(window=125).mean().iloc[-1]) * 100
              momentum_score = max(0, min(100, (ratio - 90) * 5))
              # 마스터 점수 추가/수정
              data['master_score'] = int((vix_score * 0.5) + (momentum_score * 0.5))
          except:
              data['master_score'] = data.get('master_score', 50)

          # 3. 데이터 저장 (기존 데이터 유지하며 master_score만 갱신)
          with open(file_path, 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=4, ensure_ascii=False)
          END

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add indicators.json
          git commit -m "마스터 점수 업데이트 [skip ci]" || echo "No changes"
          git push