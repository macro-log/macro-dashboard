name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U google-generativeai yfinance pandas requests deep-translator

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import warnings
          warnings.filterwarnings("ignore", category=FutureWarning) # 경고 메시지 제거
          import yfinance as yf
          import json
          import os
          import requests
          import re
          import datetime
          import google.generativeai as genai
          from deep_translator import GoogleTranslator
          from xml.etree import ElementTree

          # 1. 환경 설정 및 시간 계산
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. 실시간 마켓 데이터 수집 (9대 지표 및 AI 분석용)
          tickers_list = ['BTC-USD', 'SPY', 'QQQ', 'DIA', 'DX-Y.NYB', '^VIX', 'GC=F', 'HYG', 'XLY', 'XLP', '^TNX', '^TYX']
          raw = {t: yf.Ticker(t).history(period="180d") for t in tickers_list}
          
          def get_chg(t): return round(((raw[t]['Close'].iloc[-1] / raw[t]['Close'].iloc[-2]) - 1) * 100, 2)
          current_vix = round(raw['^VIX']['Close'].iloc[-1], 2)
          market_stats = f"VIX: {current_vix}, S&P500: {get_chg('SPY')}%, Nasdaq: {get_chg('QQQ')}%, BTC: {get_chg('BTC-USD')}%"

          # [엔진] 9대 지표 실시간 스코어 계산 (온도 -2.5 고정용)
          def calculate_master_score():
              try:
                  def get_s(val, mid, span): return max(0, min(100, (val - (mid - span)) * (100 / (2 * span))))
                  s1 = get_s(35 - current_vix, 20, 15) * 0.25
                  s2 = get_s(-((raw['GC=F']['Close'].iloc[-1]/raw['GC=F']['Close'].iloc[-2]-1)*100), 0, 2) * 0.15
                  s3 = get_s(raw['SPY']['Close'].iloc[-1]/raw['SPY']['Close'].rolling(120).mean().iloc[-1]*100, 100, 5) * 0.15
                  s4 = get_s(get_chg('BTC-USD'), 0, 3) * 0.10
                  s5 = get_s(-get_chg('DX-Y.NYB'), 0, 1) * 0.10
                  cons = (raw['XLY']['Close'].iloc[-1]/raw['XLP']['Close'].iloc[-1]) / (raw['XLY']['Close'].iloc[-2]/raw['XLP']['Close'].iloc[-2]) - 1
                  s6 = get_s(cons*100, 0, 1) * 0.10
                  s7 = get_s(raw['HYG']['Close'].iloc[-1]/raw['HYG']['Close'].rolling(20).mean().iloc[-1]*100, 100, 2) * 0.075
                  def get_mfi(t): return (raw[t]['Close'].iloc[-1] * raw[t]['Volume'].iloc[-1]) / ((raw[t]['Close'] * raw[t]['Volume']).rolling(20).mean().iloc[-1] + 1e-9)
                  s8 = get_s(get_mfi('QQQ') / get_mfi('DIA'), 1, 0.5) * 0.04
                  s9 = get_s(raw['^TYX']['Close'].iloc[-1] - raw['^TNX']['Close'].iloc[-1], 0.2, 0.5) * 0.035
                  return int(s1+s2+s3+s4+s5+s6+s7+s8+s9)
              except: return 50
          
          master_score = calculate_master_score()

          # 3. [불변] 연준 심리 데이터 (형님 오리지널 12개 키워드 보존)
          fomc_data = [{"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52}, {"word": "RATE", "sentiment_score": 0.4, "status": "NEUTRAL", "display_score": "+0.4", "count": 48}, {"word": "POLICY", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 34}, {"word": "RISKS", "sentiment_score": -0.5, "status": "NEUTRAL", "display_score": "-0.5", "count": 21}, {"word": "GROWTH", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 20}, {"word": "LABOR", "sentiment_score": -0.0, "status": "NEUTRAL", "display_score": "-0.0", "count": 18}, {"word": "CREDIT", "sentiment_score": 0.2, "status": "NEUTRAL", "display_score": "+0.2", "count": 13}, {"word": "GDP", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 11}, {"word": "PRICES", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 11}, {"word": "EMPLOYMENT", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 7}, {"word": "ECONOMY", "sentiment_score": -0.7, "status": "NEUTRAL", "display_score": "-0.7", "count": 5}, {"word": "STABILITY", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 3}]

          # 4. [완벽 수정] 외신 뉴스 수집 및 AI 통합 분석 (JSON 강제 출력 및 차단 회피)
          def fetch_news():
              try:
                  url = "https://news.google.com/rss/search?q=Bloomberg+OR+WSJ+OR+Reuters+Global+Market&hl=en-US&gl=US&ceid=US:en"
                  headers = {'User-Agent': 'Mozilla/5.0'} # 봇 차단 방지용 마스크
                  res = requests.get(url, headers=headers, timeout=15)
                  return [it.find('title').text for it in ElementTree.fromstring(res.content).findall('.//item')[:40]]
              except: return []

          all_headlines = fetch_news()
          dynamic_news = {}
          ai_briefing = "시황 분석 중입니다."
          period_interpretation = {"당일": "안정적 흐름", "주간": "매크로 대기", "월간": "추세 형성 중", "년간": "사이클 반영", "장기": "역사적 저점 부근"}
          
          try:
              model = genai.GenerativeModel('models/gemini-2.0-flash')
              prompt = f"""
              당신은 투자 전문 AI 'SIGNAL 9'입니다. 다음 데이터와 뉴스를 통합 분석하세요.
              [현재 데이터]: {market_stats}
              [외신 뉴스]: {chr(10).join(all_headlines[:25])}

              응답은 반드시 아래 JSON 구조와 완벽히 일치해야 합니다:
              {{
                  "briefing": "위 데이터와 뉴스를 융합하여 시장을 통찰하는 매우 날카로운 3줄 요약 (한국어)",
                  "analysis": {{
                      "당일": "오늘의 주요 변동 요인 (20자 내외)",
                      "주간": "이번 주 매크로 모멘텀 (20자 내외)",
                      "월간": "월간 추세선 해석 (20자 내외)",
                      "년간": "올해 사이클 전망 (20자 내외)",
                      "장기": "장기적 투자 뷰 (20자 내외)"
                  }},
                  "거시경제": [ {{"title": "실제 뉴스 제목 (한국어 번역)", "summary": "뉴스 핵심 1줄 요약"}} ],
                  "주식시장": [ {{"title": "실제 뉴스 제목 (한국어 번역)", "summary": "뉴스 핵심 1줄 요약"}} ],
                  "암호화폐": [ {{"title": "실제 뉴스 제목 (한국어 번역)", "summary": "뉴스 핵심 1줄 요약"}} ],
                  "원자재": [ {{"title": "실제 뉴스 제목 (한국어 번역)", "summary": "뉴스 핵심 1줄 요약"}} ],
                  "빅테크": [ {{"title": "실제 뉴스 제목 (한국어 번역)", "summary": "뉴스 핵심 1줄 요약"}} ],
                  "지정학": [ {{"title": "실제 뉴스 제목 (한국어 번역)", "summary": "뉴스 핵심 1줄 요약"}} ]
              }}
              """
              # 제미나이가 딴소리 못하고 무조건 JSON만 내뱉게 강제하는 옵션
              response = model.generate_content(prompt, generation_config={"response_mime_type": "application/json"})
              data = json.loads(response.text)
              
              ai_briefing = data.get("briefing", ai_briefing)
              period_interpretation = data.get("analysis", period_interpretation)
              
              # 6대 섹터에 해당하는 뉴스만 깔끔하게 저장
              for key in ["거시경제", "주식시장", "암호화폐", "원자재", "빅테크", "지정학"]:
                  if key in data and data[key]:
                      dynamic_news[key] = data[key]
                      
              print("✅ AI 뉴스 딥다이브 분석 성공!")
          except Exception as e:
              print(f"⚠️ AI 분석 중 에러 발생: {e}")

          # 5. indicators.json 저장
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "last_updated": sync_time,
                  "master_score": master_score,
                  "market_temp": "-2.5", # 온도 고정
                  "ai_summary": ai_briefing,
                  "period_interpretation": period_interpretation, # ★차트 해석 데이터
                  "fomc_indicators": fomc_data,
                  "engine_indicators": fomc_data,
                  "dynamic_news": dynamic_news
              }, f, ensure_ascii=False, indent=4)

          # 6. [전격 수정] 차트 엔진 (★기존 HTML 수술 없이 바로 뜨는 마법 코드★)
          try:
              chart_tickers = {'BTC': 'BTC-USD', 'SPY': 'SPY', 'QQQ': 'QQQ', 'DIA': 'DIA', 'US10Y': '^TNX', 'USDKRW': 'KRW=X'}
              chart_data = {}
              for name, tkr in chart_tickers.items():
                  try:
                      tk = yf.Ticker(tkr)
                      # 공통 데이터 생성 함수 (개수 일치 보증)
                      def sync_data(df, label_fmt):
                          if df.empty: return {"labels": [], "prices": []}
                          labels = df.index.strftime(label_fmt).tolist()
                          prices = [round(float(p), 2) for p in df['Close'].tolist()]
                          # 길이 불일치 강제 보정
                          min_len = min(len(labels), len(prices))
                          return {"labels": labels[:min_len], "prices": prices[:min_len]}

                      # [당일] 7일치에서 마지막 영업일 15분봉
                      d_raw = tk.history(period="7d", interval="15m")
                      if not d_raw.empty:
                          d_final = d_raw[d_raw.index.date == d_raw.index[-1].date()]
                          day_data = sync_data(d_final, '%H:%M')
                      else:
                          day_data = {"labels": [], "prices": []}

                      # [주간, 월간, 년간, 장기] 추가
                      week_data = sync_data(tk.history(period="1mo", interval="1h").tail(168), '%m-%d %H:00')
                      month_data = sync_data(tk.history(period="6mo", interval="1d").tail(30), '%m-%d')
                      year_data = sync_data(tk.history(period="2y", interval="1d").tail(365), '%Y-%m')
                      long_data = sync_data(tk.history(period="max", interval="1wk"), '%Y')

                      chart_data[name] = {
                          "labels": day_data["labels"], # ★ 형님 사이트에서 HTML 안 고쳐도 바로 뜨게 하는 꼼수 1
                          "prices": day_data["prices"], # ★ 형님 사이트에서 HTML 안 고쳐도 바로 뜨게 하는 꼼수 2
                          "day": day_data,
                          "week": week_data,
                          "month": month_data,
                          "year": year_data,
                          "long": long_data
                      }

                      print(f"📊 {name} 데이터 동기화 완료 (Day: {len(chart_data[name]['labels'])})")
                  except: continue
              
              with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
                  json.dump(chart_data, f, ensure_ascii=False)
          except: pass

          # 7. 실적 이벤트 (보존)
          try:
              events = [{"date": datetime.date.today().strftime('%Y-%m-%d'), "name": "시스템 통합 분석 완료", "importance": "NORMAL", "type": "SYSTEM"}]
              with open('PROJECT/economic_events.json', 'w', encoding='utf-8') as f:
                  json.dump(events, f, ensure_ascii=False, indent=4)
          except: pass
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "기존 사이트 호환성 추가 및 멀티 차트 데이터 동기화 🚀" || echo "No changes"
          git push