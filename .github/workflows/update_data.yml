name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U google-generativeai yfinance pandas requests

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import warnings
          warnings.filterwarnings("ignore", category=FutureWarning)
          import yfinance as yf
          import json, os, requests, re, datetime, urllib.request
          import google.generativeai as genai
          from xml.etree import ElementTree

          # 1. 환경 설정 및 시간 계산
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. 실시간 마켓 데이터 수집 (마스터 스코어용)
          tickers_list = ['BTC-USD', 'SPY', 'QQQ', 'DIA', 'DX-Y.NYB', '^VIX', 'GC=F', 'HYG', 'XLY', 'XLP', '^TNX', '^TYX']
          raw = {t: yf.Ticker(t).history(period="180d") for t in tickers_list}
          
          def get_chg(t): return round(((raw[t]['Close'].iloc[-1] / raw[t]['Close'].iloc[-2]) - 1) * 100, 2)
          current_vix = round(raw['^VIX']['Close'].iloc[-1], 2)

          # [엔진] 9대 지표 실시간 스코어 계산 (로직 유지)
          def calculate_master_score():
              try:
                  def get_s(val, mid, span): return max(0, min(100, (val - (mid - span)) * (100 / (2 * span))))
                  s1 = get_s(35 - current_vix, 20, 15) * 0.25
                  s2 = get_s(-((raw['GC=F']['Close'].iloc[-1]/raw['GC=F']['Close'].iloc[-2]-1)*100), 0, 2) * 0.15
                  s3 = get_s(raw['SPY']['Close'].iloc[-1]/raw['SPY']['Close'].rolling(120).mean().iloc[-1]*100, 100, 5) * 0.15
                  s4 = get_s(get_chg('BTC-USD'), 0, 3) * 0.10
                  s5 = get_s(-get_chg('DX-Y.NYB'), 0, 1) * 0.10
                  cons = (raw['XLY']['Close'].iloc[-1]/raw['XLP']['Close'].iloc[-1]) / (raw['XLY']['Close'].iloc[-2]/raw['XLP']['Close'].iloc[-2]) - 1
                  s6 = get_s(cons*100, 0, 1) * 0.10
                  s7 = get_s(raw['HYG']['Close'].iloc[-1]/raw['HYG']['Close'].rolling(20).mean().iloc[-1]*100, 100, 2) * 0.075
                  def get_mfi(t): return (raw[t]['Close'].iloc[-1] * raw[t]['Volume'].iloc[-1]) / ((raw[t]['Close'] * raw[t]['Volume']).rolling(20).mean().iloc[-1] + 1e-9)
                  s8 = get_s(get_mfi('QQQ') / get_mfi('DIA'), 1, 0.5) * 0.04
                  s9 = get_s(raw['^TYX']['Close'].iloc[-1] - raw['^TNX']['Close'].iloc[-1], 0.2, 0.5) * 0.035
                  return int(s1+s2+s3+s4+s5+s6+s7+s8+s9)
              except: return 50
          master_score = calculate_master_score()

          # 블랙 스완 및 밸류헌터 데이터 생성 (로직 유지)
          v_series = raw['^VIX']['Close']
          black_swan_score = int(max(0, (v_series.iloc[-1] / v_series.tail(5).mean() - 1) * 100) * 0.4 + 20)

          scan_tickers = ['AAPL', 'MSFT', 'NVDA', 'TSLA', 'GOOGL', 'AMZN', 'META', 'AVGO', 'COST', 'NFLX', 'SMCI', 'ARM', 'TSM', 'ASML']
          undervalued_stocks = []
          for t in scan_tickers:
              try:
                  tk = yf.Ticker(t); info = tk.info
                  eps_g = info.get('earningsGrowth', 0)
                  if eps_g >= 0.10: 
                      undervalued_stocks.append({"ticker": t, "score": round(eps_g*100, 1), "price": f"${info.get('currentPrice')}", "is_premium": False})
              except: continue
          top_undervalued = sorted(undervalued_stocks, key=lambda x: x['score'], reverse=True)[:3]
          for i, s in enumerate(top_undervalued):
              if i > 0: s['is_premium'] = True

          # FOMC/뉴스/AI 요약 (로직 유지)
          fomc_data = [{"word": "INFLATION", "sentiment_score": -1.8, "count": 52}, {"word": "RATE", "sentiment_score": 0.4, "count": 48}]
          
          def fetch_news():
              headlines = []
              try:
                  res = urllib.request.urlopen("https://feeds.a.dj.com/rss/RSSMarketsMain.xml", timeout=10)
                  root = ElementTree.fromstring(res.read())
                  for item in root.findall('.//item')[:10]: headlines.append(item.find('title').text)
              except: pass
              return headlines
          
          all_headlines = fetch_news()
          ai_briefing = ["시장 분석 중..."]
          try:
              model = genai.GenerativeModel('gemini-2.0-flash')
              prompt = f"뉴스 요약 3줄 리스트 생성: {all_headlines}"
              response = model.generate_content(prompt, generation_config={"response_mime_type": "application/json"})
              ai_briefing = json.loads(response.text).get("briefing", ai_briefing)
          except: pass

          # 6. indicators.json 저장
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({"last_updated": sync_time, "master_score": master_score, "undervalued": top_undervalued, "ai_summary": ai_briefing, "fomc_indicators": fomc_data}, f, ensure_ascii=False, indent=4)

          # 7. 차트 엔진 (★ 누락된 티커 추가 및 기간 구분 명확화 ★)
          chart_tickers = {
              'BTC': 'BTC-USD', 
              'SPY': 'SPY', 
              'QQQ': 'QQQ', 
              'DIA': 'DIA', 
              'US10Y': '^TNX', 
              'US02Y': '^FVX',  # 2년/5년물 국채 수익률
              'OIL': 'CL=F',    # 유가 (WTI)
              'GOLD': 'GC=F',   # 금
              'KOSPI': '^KS11', # 코스피
              'USDKRW': 'KRW=X' # 환율
          }
          
          chart_data = {}
          for name, tkr in chart_tickers.items():
              try:
                  tk = yf.Ticker(tkr)
                  def sync_data(df, label_fmt):
                      if df.empty: return {"labels": [], "prices": []}
                      return {"labels": df.index.strftime(label_fmt).tolist(), "prices": [round(float(x), 2) for x in df['Close'].tolist()]}
                  
                  # 각 데이터 포인트 수집
                  chart_data[name] = {
                      "day": sync_data(tk.history(period="1d", interval="15m"), '%H:%M'),
                      "week": sync_data(tk.history(period="5d", interval="1h"), '%m-%d %H:00'),
                      "month": sync_data(tk.history(period="1mo", interval="1d"), '%m-%d'),
                      "quarter": sync_data(tk.history(period="3mo", interval="1d"), '%m-%d'), # 3개월 분기 데이터
                      "year": sync_data(tk.history(period="1y", interval="1wk"), '%y-%m'),
                      "long": sync_data(tk.history(period="max", interval="1mo"), '%Y')
                  }
              except Exception as e:
                  print(f"Error fetching {name}: {e}")
                  continue

          with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
              json.dump(chart_data, f, ensure_ascii=False)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "차트 티커(국채2년, 유가, 금, 코스피) 추가 및 기간 구분 업데이트 🚀" || echo "No changes"
          git push