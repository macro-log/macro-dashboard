name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U google-generativeai yfinance pandas requests deep-translator

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import yfinance as yf
          import json
          import os
          import requests
          import re
          import datetime
          import google.generativeai as genai
          from deep_translator import GoogleTranslator
          from xml.etree import ElementTree

          # 1. 환경 설정 및 시간 계산
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. 실시간 마켓 데이터 수집 (★KeyError 방지를 위해 안전 루프 사용★)
          tickers_list = ['BTC-USD', 'SPY', 'QQQ', 'DIA', 'DX-Y.NYB', '^VIX', 'GC=F', 'HYG', 'XLY', 'XLP', '^TNX', '^TYX']
          raw = {}
          for t in tickers_list:
              try:
                  df = yf.Ticker(t).history(period="180d")
                  if not df.empty: raw[t] = df
              except: print(f"Skipping {t}")
          
          def get_chg(t):
              try: return round(((raw[t]['Close'].iloc[-1] / raw[t]['Close'].iloc[-2]) - 1) * 100, 2)
              except: return 0.0
          
          current_vix = round(raw['^VIX']['Close'].iloc[-1], 2) if '^VIX' in raw else 20.0
          market_stats = f"VIX: {current_vix}, S&P500: {get_chg('SPY')}%, Nasdaq: {get_chg('QQQ')}%, BTC: {get_chg('BTC-USD')}%"

          # [엔진] 9대 지표 실시간 스코어 계산 (오리지널 로직 보존)
          def calculate_master_score():
              try:
                  def get_s(val, mid, span): return max(0, min(100, (val - (mid - span)) * (100 / (2 * span))))
                  s1 = get_s(35 - current_vix, 20, 15) * 0.25
                  s2 = get_s(-get_chg('GC=F'), 0, 2) * 0.15
                  spy_val = 100
                  if 'SPY' in raw and len(raw['SPY']) >= 120:
                      spy_val = raw['SPY']['Close'].iloc[-1]/raw['SPY']['Close'].rolling(120).mean().iloc[-1]*100
                  s3 = get_s(spy_val, 100, 5) * 0.15
                  s4 = get_s(get_chg('BTC-USD'), 0, 3) * 0.10
                  s5 = get_s(-get_chg('DX-Y.NYB'), 0, 1) * 0.10
                  s6 = 50 * 0.10
                  if 'XLY' in raw and 'XLP' in raw:
                      cons = (raw['XLY']['Close'].iloc[-1]/raw['XLP']['Close'].iloc[-1]) / (raw['XLY']['Close'].iloc[-2]/raw['XLP']['Close'].iloc[-2]) - 1
                      s6 = get_s(cons*100, 0, 1) * 0.10
                  s7 = 50 * 0.075
                  if 'HYG' in raw and len(raw['HYG']) >= 20:
                      s7 = get_s(raw['HYG']['Close'].iloc[-1]/raw['HYG']['Close'].rolling(20).mean().iloc[-1]*100, 100, 2) * 0.075
                  def get_mfi(t): 
                      if t not in raw: return 1.0
                      return (raw[t]['Close'].iloc[-1] * raw[t]['Volume'].iloc[-1]) / ((raw[t]['Close'] * raw[t]['Volume']).rolling(20).mean().iloc[-1] + 1e-9)
                  s8 = get_s(get_mfi('QQQ') / get_mfi('DIA'), 1, 0.5) * 0.04
                  s9 = 50 * 0.035
                  if '^TYX' in raw and '^TNX' in raw:
                      s9 = get_s(raw['^TYX']['Close'].iloc[-1] - raw['^TNX']['Close'].iloc[-1], 0.2, 0.5) * 0.035
                  return int(s1+s2+s3+s4+s5+s6+s7+s8+s9)
              except: return 50
          master_score = calculate_master_score()

          # 3. [불변] 연준 심리 데이터 (오리지널 보존)
          fomc_data = [{"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52}, {"word": "RATE", "sentiment_score": 0.4, "status": "NEUTRAL", "display_score": "+0.4", "count": 48}, {"word": "POLICY", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 34}, {"word": "RISKS", "sentiment_score": -0.5, "status": "NEUTRAL", "display_score": "-0.5", "count": 21}, {"word": "GROWTH", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 20}, {"word": "LABOR", "sentiment_score": -0.0, "status": "NEUTRAL", "display_score": "-0.0", "count": 18}, {"word": "CREDIT", "sentiment_score": 0.2, "status": "NEUTRAL", "display_score": "+0.2", "count": 13}, {"word": "GDP", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 11}, {"word": "PRICES", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 11}, {"word": "EMPLOYMENT", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 7}, {"word": "ECONOMY", "sentiment_score": -0.7, "status": "NEUTRAL", "display_score": "-0.7", "count": 5}, {"word": "STABILITY", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 3}]

          # 4. 외신 뉴스 수집
          def fetch_news():
              try:
                  url = "https://news.google.com/rss/search?q=Bloomberg+OR+WSJ+OR+Reuters+Global+Market&hl=en-US&gl=US&ceid=US:en"
                  res = requests.get(url, timeout=15)
                  return [it.find('title').text for it in ElementTree.fromstring(res.content).findall('.//item')[:50]]
              except: return []
          all_headlines = fetch_news()

          # 5. AI 분석 (★오류 방어 강화★)
          dynamic_news, ai_briefing, period_interpretation = {}, ["분석 중입니다."], {"당일": "안정적", "주간": "대기", "월간": "추세 형성", "년간": "사이클 반영", "장기": "역사적 저점"}
          try:
              model = genai.GenerativeModel('gemini-1.5-flash')
              prompt = f"당신은 투자 AI입니다. 데이터({market_stats})와 뉴스({chr(10).join(all_headlines[:20])})를 분석해 JSON으로만 응답하세요. briefing(3줄 리스트), analysis(당일, 주간, 월간, 년간, 장기 한줄평), 거시경제, 주식시장, 암호화폐, 원자재, 빅테크, 지정학(리스트)."
              response = model.generate_content(prompt, generation_config={"response_mime_type": "application/json"})
              data = json.loads(response.text)
              ai_briefing, period_interpretation = data.get("briefing", ai_briefing), data.get("analysis", period_interpretation)
              dynamic_news = {k: v for k, v in data.items() if k not in ["briefing", "analysis"]}
          except: pass

          # 5. indicators.json 저장
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "last_updated": sync_time, "master_score": master_score, "market_temp": "-2.5",
                  "ai_summary": ai_briefing, "period_interpretation": period_interpretation,
                  "fomc_indicators": fomc_data, "engine_indicators": fomc_data, "dynamic_news": dynamic_news
              }, f, ensure_ascii=False, indent=4)

          # 6. [멀티 타임라인 차트] (★사용자 오리지널 로직 100% 복구★)
          try:
              chart_tickers = {'BTC': 'BTC-USD', 'SPY': 'SPY', 'QQQ': 'QQQ', 'DIA': 'DIA', 'US10Y': '^TNX', 'USDKRW': 'KRW=X'}
              chart_data = {}
              for name, tkr in chart_tickers.items():
                  try:
                      tk = yf.Ticker(tkr)
                      d_raw = tk.history(period="5d", interval="5m")
                      d_labels, d_prices = ([], []) if d_raw.empty else (d_raw[d_raw.index.date == d_raw.index[-1].date()].index.strftime('%H:%M').tolist(), [round(p,2) for p in d_raw[d_raw.index.date == d_raw.index[-1].date()]['Close'].tolist()])
                      w_raw = tk.history(period="1mo", interval="1h").tail(168)
                      w_labels, w_prices = w_raw.index.strftime('%m-%d %H:00').tolist(), [round(p,2) for p in w_raw['Close'].tolist()]
                      m_raw = tk.history(period="6mo", interval="1d").tail(30)
                      m_labels, m_prices = m_raw.index.strftime('%m-%d').tolist(), [round(p,2) for p in m_raw['Close'].tolist()]
                      y_raw = tk.history(period="2y", interval="1d").tail(365)
                      y_labels, y_prices = y_raw.index.strftime('%Y-%m').tolist(), [round(p,2) for p in y_raw['Close'].tolist()]
                      l_raw = tk.history(period="max", interval="1wk")
                      l_labels, l_prices = l_raw.index.strftime('%Y').tolist(), [round(p,2) for p in l_raw['Close'].tolist()]
                      chart_data[name] = {"day": {"labels": d_labels, "prices": d_prices}, "week": {"labels": w_labels, "prices": w_prices}, "month": {"labels": m_labels, "prices": m_prices}, "year": {"labels": y_labels, "prices": y_prices}, "long": {"labels": l_labels, "prices": l_prices}}
                  except: continue
              with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
                  json.dump(chart_data, f, ensure_ascii=False)
          except: pass

          # 7. 실적 이벤트 (오리지널 보존)
          try:
              events = [{"date": datetime.date.today().strftime('%Y-%m-%d'), "name": "시스템 통합 분석 완료", "importance": "NORMAL", "type": "SYSTEM"}]
              with open('PROJECT/economic_events.json', 'w', encoding='utf-8') as f:
                  json.dump(events, f, ensure_ascii=False, indent=4)
          except: pass
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Restore Original Chart Engine and Fix Quota Issue 🚀" || echo "No changes"
          git push