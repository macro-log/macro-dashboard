name: Financial Data Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U google-generativeai yfinance pandas requests deep-translator

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import yfinance as yf
          import json
          import os
          import requests
          import re
          import datetime
          import google.generativeai as genai
          from deep_translator import GoogleTranslator
          from email.utils import parsedate_to_datetime
          from xml.etree import ElementTree

          # 1. 환경 설정 및 시간 계산
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)
          now_korea = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=9))
          sync_time = now_korea.strftime('%Y-%m-%d %H:%M:%S')

          # 2. 연준 심리 데이터 (형님 오리지널 12개 키워드 보존)
          fomc_data = [
              {"word": "INFLATION", "sentiment_score": -1.8, "status": "NEUTRAL", "display_score": "-1.8", "count": 52},
              {"word": "RATE", "sentiment_score": 0.4, "status": "NEUTRAL", "display_score": "+0.4", "count": 48},
              {"word": "POLICY", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 34},
              {"word": "RISKS", "sentiment_score": -0.5, "status": "NEUTRAL", "display_score": "-0.5", "count": 21},
              {"word": "GROWTH", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 20},
              {"word": "LABOR", "sentiment_score": -0.0, "status": "NEUTRAL", "display_score": "-0.0", "count": 18},
              {"word": "CREDIT", "sentiment_score": 0.2, "status": "NEUTRAL", "display_score": "+0.2", "count": 13},
              {"word": "GDP", "sentiment_score": -0.2, "status": "NEUTRAL", "display_score": "-0.2", "count": 11},
              {"word": "PRICES", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 11},
              {"word": "EMPLOYMENT", "sentiment_score": -0.1, "status": "NEUTRAL", "display_score": "-0.1", "count": 7},
              {"word": "ECONOMY", "sentiment_score": -0.7, "status": "NEUTRAL", "display_score": "-0.7", "count": 5},
              {"word": "STABILITY", "sentiment_score": 0.0, "status": "NEUTRAL", "display_score": "0.0", "count": 3}
          ]

          # 3. 뉴스 수집 및 키워드 분류 맵 (AI 실패 대비)
          sector_map = {
              "시장 종합": ["market", "stock", "global", "economy", "outlook"],
              "빅테크": ["apple", "microsoft", "google", "amazon", "meta", "tesla", "tech"],
              "반도체": ["nvidia", "semiconductor", "chip", "ai chip", "tsmc", "samsung"],
              "금리/매크로": ["fed", "rate", "inflation", "cpi", "powell", "fomc"],
              "에너지/원자재": ["oil", "energy", "gold", "gas", "commodity", "crude"],
              "가상자산": ["bitcoin", "crypto", "eth", "binance", "coinbase", "etf"]
          }

          def fetch_news():
              url = "https://news.google.com/rss/search?q=Global+Market+Economy+Tech+Stock&hl=en-US&gl=US&ceid=US:en"
              headlines = []
              try:
                  res = requests.get(url, timeout=15)
                  tree = ElementTree.fromstring(res.content)
                  for it in tree.findall('.//item')[:50]:
                      headlines.append(it.find('title').text)
              except: pass
              return headlines

          all_headlines = fetch_news()

          # 4. AI 'SIGNAL 9' 프리미엄 리포트 분석
          dynamic_news = {}
          success = False
          try:
              # 무료 한도가 가장 넉넉한 2.0-flash 시도
              model = genai.GenerativeModel('models/gemini-2.0-flash')
              prompt = f"""
              당신은 투자 전문 분석가 'SIGNAL 9'입니다. 다음 뉴스들을 분석하여 리포트를 작성하세요.
              1. 뉴스들을 이 6개 섹터로 분류하세요: {list(sector_map.keys())}.
              2. 각 섹터마다 가장 중요한 뉴스 3~5개를 선정하세요.
              3. 각 뉴스에 대해 기사 제목을 그대로 번역하지 말고, 당신이 직접 '한국어 인사이트 제목'을 지으세요.
              4. 제목 아래에 1~2줄의 핵심 요약을 작성하세요.
              5. 반드시 다음 JSON 형식으로만 응답하세요:
              {{
                "섹터명": [
                  {{"title": "직접 지은 한국어 제목1", "summary": "핵심 내용 요약1"}},
                  {{"title": "직접 지은 한국어 제목2", "summary": "핵심 내용 요약2"}}
                ]
              }}
              
              뉴스 목록:
              {chr(10).join(all_headlines)}
              """
              response = model.generate_content(prompt)
              json_match = re.search(r'\{.*\}', response.text, re.DOTALL)
              if json_match:
                  dynamic_news = json.loads(json_match.group())
                  success = True
                  print("✅ AI 리포트 생성 성공")
          except Exception as e:
              print(f"❌ AI 분석 실패 (한도초과 등): {e}")

          # [우회 모드] AI가 뻗었을 때 (지능형 키워드 분류 + 번역기)
          if not success:
              print("🚨 번역기 우회 모드 가동")
              translator = GoogleTranslator(source='en', target='ko')
              for sector, keywords in sector_map.items():
                  # 키워드 매칭되는 뉴스 3개 선정
                  matched = [h for h in all_headlines if any(k in h.lower() for k in keywords)][:3]
                  if not matched: matched = all_headlines[:3]
                  
                  sector_items = []
                  for m in matched:
                      try:
                          clean_title = m.split(" - ")[0]
                          translated_title = translator.translate(clean_title)
                          sector_items.append({
                              "title": f"[속보] {translated_title}",
                              "summary": "AI 분석 한도 초과로 인해 상세 요약은 내일 아침 리셋 후 제공됩니다."
                          })
                      except: continue
                  dynamic_news[sector] = sector_items

          # 5. indicators.json 저장 (풀옵션 데이터 통합)
          os.makedirs('PROJECT', exist_ok=True)
          with open('PROJECT/indicators.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "last_updated": sync_time,
                  "master_score": 72,
                  "market_temp": "-2.5", # 온도계 바늘
                  "ai_summary": "SIGNAL 9 AI 분석 엔진이 실시간 시황을 요약했습니다.",
                  "fomc_indicators": fomc_data, # 상세 표
                  "engine_indicators": fomc_data, # 상세 표
                  "dynamic_news": dynamic_news # 6섹터 [제목+요약] 리스트
              }, f, ensure_ascii=False, indent=4)

          # 6. 시장 차트 데이터 수집 (유지)
          try:
              chart_tickers = {'BTC': 'BTC-USD', 'SPY': 'SPY', 'QQQ': 'QQQ', 'DIA': 'DIA', 'US10Y': '^TNX', 'US02Y': '^FVX', 'OIL': 'CL=F', 'GOLD': 'GC=F', 'KOSPI': '^KS11', 'USDKRW': 'KRW=X'}
              chart_data = {}
              for name, ticker in chart_tickers.items():
                  try:
                      tk = yf.Ticker(ticker)
                      df_day = tk.history(period="1d", interval="5m")
                      df_full = tk.history(period="10y", interval="1d")
                      chart_data[name] = {
                          "day": {"labels": df_day.index.strftime('%H:%M').tolist(), "prices": [round(p, 2) for p in df_day['Close'].tolist()]},
                          "full": {"labels": df_full.index.strftime('%Y-%m-%d').tolist(), "prices": [round(p, 2) for p in df_full['Close'].tolist()]}
                      }
                  except: continue
              with open('PROJECT/market_charts.json', 'w', encoding='utf-8') as f:
                  json.dump(chart_data, f, ensure_ascii=False)
          except: pass

          # 7. 경제 이벤트 수집 (유지)
          try:
              today = datetime.date.today()
              events = []
              for s in ['NVDA', 'TSLA', 'AAPL', 'MSFT', 'AMZN', 'GOOGL', 'META']:
                  try:
                      cal = yf.Ticker(s).calendar
                      if cal is not None and 'Earnings Date' in cal:
                          e_date = cal['Earnings Date'][0].date()
                          if e_date >= today:
                              events.append({"date": e_date.strftime('%Y-%m-%d'), "name": f"{s} 실적", "importance": "NORMAL", "type": "EARNINGS"})
                  except: continue
              with open('PROJECT/economic_events.json', 'w', encoding='utf-8') as f:
                  json.dump(events, f, ensure_ascii=False, indent=4)
          except: pass
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "SIGNAL 9 프리미엄 뉴스 리포트 엔진(제목+요약 리스트) 장착 🚀" || echo "No changes"
          git push