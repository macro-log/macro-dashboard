<body>
    <header class="p-4 bg-[#161e31] border-b border-[#262f45] flex justify-between items-center px-8">
        <div class="flex items-center gap-3">
            <div class="w-3 h-8 bg-[#38bdf8] rounded-sm"></div>
            <div class="text-2xl font-black text-[#38bdf8]">SIGNAL 9</div>
        </div>
    </header>
    <div class="main-layout">
        <div class="nav-group">
            <button onclick="changeWidget('BINANCE:BTCUSDT')">BITCOIN</button>
            <button onclick="changeWidget('AMEX:SPY')">S&P 500</button>
            <button onclick="changeWidget('NASDAQ:QQQ')">NASDAQ 100</button>
            <button onclick="changeWidget('TVC:GOLD')">GOLD</button>
        </div>
        <div id="ticker_container"></div>
        <div id="chart_box"></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
            <div class="card">
                <h3 class="text-lg font-bold mb-4 text-[#38bdf8]">실시간 지표 분석</h3>
                <ul id="indicator-list" class="scroll-list space-y-2"></ul>
            </div>
            <div class="card">
                <h3 class="text-lg font-bold mb-4 text-[#38bdf8]">섹터별 뉴스</h3>
                <div id="news-box" class="scroll-list"></div>
            </div>
        </div>
    </div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function loadTicker(symbol) {
            const container = document.getElementById('ticker_container');
            container.innerHTML = "";
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
            script.async = true;
            script.innerHTML = JSON.stringify({ "symbol": symbol, "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "ko" });
            container.appendChild(script);
        }
        function loadChart(symbol) {
            document.getElementById('chart_box').innerHTML = "";
            new TradingView.widget({
                "width": "100%", "height": "100%", "symbol": symbol, "interval": "D", "theme": "dark", "style": "1",
                "container_id": "chart_box", "locale": "ko",
                "hide_side_toolbar": false, "details": false, "hotlist": false, "calendar": false,
                "studies": [ "Volume@tv-basicstudies" ],
                "overrides": { 
                    "paneProperties.rightMargin": 15,
                    "mainSeriesProperties.priceAxisProperties.autoScale": true
                }
            });
        }
        function changeWidget(symbol) { loadTicker(symbol); loadChart(symbol); }
        // 데이터 업데이트 로직 (간소화 복구)
        async function updateData() {
            try {
                const res = await fetch('indicators.json?v=' + Date.now());
                const data = await res.json();
                document.getElementById('indicator-list').innerHTML = data.indicators.map(i => `
                    <li class="flex justify-between p-2 border-b border-gray-800">
                        <span>${i.word}</span>
                        <span class="${i.sentiment_score >= 0 ? 'text-sky-400' : 'text-red-400'}">${i.display_score}</span>
                    </li>`).join('');
            } catch(e) {}
        }
        window.onload = () => { changeWidget('AMEX:SPY'); updateData(); };
    </script>
</body>
</html>
