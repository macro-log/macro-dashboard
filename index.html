<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL 9 | 리얼타임 터미널</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-main: #0a0f1e; --bg-card: #161e31; --accent: #38bdf8; --border: #262f45; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-main); color: #f1f5f9; margin: 0; overflow-x: hidden; }
        .main-layout { padding: 20px; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .nav-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        button { padding: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: #94a3b8; border-radius: 4px; font-weight: 700; transition: 0.2s; }
        button:hover { background: var(--accent); color: var(--bg-main); }
        /* 겹침 방지: 요소들이 각자 영역을 확실히 차지하게 함 */
        #ticker_container { height: 75px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        #chart_box { min-height: 600px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .card { background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        .section-label { color: var(--accent); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .scroll-list { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <header class="p-4 bg-[#161e31] border-b border-[#262f45] flex justify-between items-center px-8">
        <div class="flex items-center gap-3">
            <div class="w-3 h-8 bg-[#38bdf8] rounded-sm"></div>
            <div class="text-2xl font-black text-[#38bdf8]">SIGNAL 9</div>
        </div>
        <div class="text-[11px] text-gray-500 font-bold">REAL-TIME MACRO TERMINAL V2.9</div>
    </header>
    <div class="main-layout">
        <div class="nav-group">
            <button onclick="changeWidget('BINANCE:BTCUSDT')">BITCOIN</button>
            <button onclick="changeWidget('AMEX:SPY')">S&P 500</button>
            <button onclick="changeWidget('NASDAQ:QQQ')">NASDAQ 100</button>
            <button onclick="changeWidget('TVC:GOLD')">GOLD</button>
        </div>
        <div id="ticker_container"></div>
        <div id="chart_box"></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
            <div class="card">
                <span class="section-label">Dual Analytics</span>
                <h3 class="text-lg font-bold mb-4">실시간 연준 심리 분석</h3>
                <canvas id="sentimentChart" height="300"></canvas>
            </div>
            <div class="card">
                <span class="section-label">Metrics</span>
                <h3 class="text-lg font-bold mb-4">데이터 상세 리스트</h3>
                <ul id="indicator-list" class="scroll-list space-y-2"></ul>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10">
            <div class="card min-h-[300px]"><span class="section-label">빅테크</span><div id="news-bigtech"></div></div>
            <div class="card min-h-[300px]"><span class="section-label">반도체/AI</span><div id="news-semicon"></div></div>
            <div class="card min-h-[300px]"><span class="section-label">금융/매크로</span><div id="news-finance"></div></div>
        </div>
    </div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function loadChart(symbol) {
            new TradingView.widget({
                "width": "100%", "height": 600, "symbol": symbol, "interval": "D", "theme": "dark",
                "style": "1", "container_id": "chart_box", "locale": "ko", "allow_symbol_change": true
            });
        }
        function changeWidget(symbol) { loadChart(symbol); }
        async function updateData() {
            try {
                const res = await fetch('indicators.json?v=' + Date.now());
                const data = await res.json();
                document.getElementById('indicator-list').innerHTML = data.indicators.map(i => `
                    <li class="flex justify-between p-2 rounded bg-[#0a0f1e] border-l-4 border-sky-500">
                        <span>${i.word}</span>
                        <span class="font-bold text-sky-400">${i.display_score}</span>
                    </li>`).join('');
                // 차트 및 뉴스 업데이트 로직 복구 (간소화)
            } catch(e) {}
        }
        window.onload = () => { loadChart('AMEX:SPY'); updateData(); };
    </script>
</body>
</html>
