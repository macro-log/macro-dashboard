<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL 9 | TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-main: #0a0f1e; --bg-card: #161e31; --accent: #38bdf8; --border: #262f45; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-main); color: #f1f5f9; margin: 0; }
        .main-layout { padding: 20px; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .nav-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        button { padding: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: #94a3b8; border-radius: 4px; font-weight: 700; transition: 0.2s; }
        button:hover { background: var(--accent); color: var(--bg-main); }
        #chart_box { height: 700px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
    </style>
</head>
<body>
    <header class="p-4 bg-[#161e31] border-b border-[#262f45] flex justify-between items-center px-8">
        <div class="flex items-center gap-3">
            <div class="w-3 h-8 bg-[#38bdf8] rounded-sm"></div>
            <div class="text-2xl font-black text-[#38bdf8]">SIGNAL 9</div>
        </div>
    </header>
    <div class="main-layout">
        <div class="nav-group">
            <button onclick="loadChart('BINANCE:BTCUSDT')">BITCOIN</button>
            <button onclick="loadChart('AMEX:SPY')">S&P 500</button>
            <button onclick="loadChart('NASDAQ:QQQ')">NASDAQ 100</button>
            <button onclick="loadChart('TVC:GOLD')">GOLD</button>
        </div>
        <div id="chart_box"></div>
    </div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function loadChart(symbol) {
            document.getElementById('chart_box').innerHTML = "";
            new TradingView.widget({
                "width": "100%", "height": "100%", "symbol": symbol, "interval": "D", "theme": "dark", "style": "1",
                "container_id": "chart_box", "locale": "ko",
                "hide_side_toolbar": true,      // 왼쪽 도구 모음 숨기기
                "details": false,               // 오른쪽 상세 정보(Key stats) 끄기
                "hotlist": false,               // 뉴스/리스트 끄기
                "calendar": false,              // 캘린더 끄기
                "withdateranges": true,
                "show_popup_button": true,
                "studies": [ "Volume@tv-basicstudies" ], // 거래량만 추가
                "overrides": { "paneProperties.rightMargin": 5 }
            });
        }
        window.onload = () => { loadChart('AMEX:SPY'); };
    </script>
</body>
</html>
